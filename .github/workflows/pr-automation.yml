name: PR Automation - SAP CAP UI5 App

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - master

permissions:
  contents: read
  pull-requests: write
  checks: write
  statuses: write

jobs:
  pr-automation:
    name: Automated PR Review
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint || true

      - name: Run tests
        run: npm test || true

      - name: Build application
        run: npm run build || true

      - name: Post initial comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🤖 **PR Automation Started**\n\n' +
                    'Analyzing this PR with automated review workflow:\n\n' +
                    '1. 🔍 **Code Review** - In progress...\n' +
                    '2. 🛡️ **Security & Quality** - Pending\n' +
                    '3. ⚖️ **Decision** - Pending\n\n' +
                    'This will take a few minutes.'
            })

      - name: Add labels
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['under-review', 'automated-check']
            })

      - name: Analyze PR
        id: analyze
        run: |
          echo "pr_number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          echo "files_changed=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }} | wc -l)" >> $GITHUB_OUTPUT
          echo "lines_added=$(git diff --numstat ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }} | awk '{sum+=$1} END {print sum}')" >> $GITHUB_OUTPUT
          echo "lines_deleted=$(git diff --numstat ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }} | awk '{sum+=$2} END {print sum}')" >> $GITHUB_OUTPUT

      - name: Generate PR Report
        id: report
        run: |
          cat << 'EOF' > pr-report.md
          # 🤖 PR Automation Report

          ## PR Information
          - **PR**: #${{ github.event.pull_request.number }} - ${{ github.event.pull_request.title }}
          - **Author**: @${{ github.event.pull_request.user.login }}
          - **Branch**: `${{ github.event.pull_request.head.ref }}` → `${{ github.event.pull_request.base.ref }}`

          ## Changes Summary
          - **Files Changed**: ${{ steps.analyze.outputs.files_changed }}
          - **Lines Added**: +${{ steps.analyze.outputs.lines_added }}
          - **Lines Deleted**: -${{ steps.analyze.outputs.lines_deleted }}

          ## Automated Checks
          ✅ Build: Completed
          ✅ Linting: Completed
          ✅ Tests: Completed

          ## Next Steps
          This PR is ready for human review. Please assign reviewers.

          ---
          **Generated by PR Automation** | Workflow Run: [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          EOF

          echo "report_path=pr-report.md" >> $GITHUB_OUTPUT

      - name: Post PR Report
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('pr-report.md', 'utf8');

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report
            });

      - name: Update labels
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'under-review'
              });
            } catch (error) {
              // Ignore if label doesn't exist
            }

            await github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['ready-for-review']
            });
