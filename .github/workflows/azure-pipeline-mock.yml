name: 🔒 Security Pipeline - Azure DevOps Mock

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to analyze'
        required: true

permissions:
  contents: read
  pull-requests: write
  security-events: write
  checks: write

jobs:
  security-scan:
    name: Security Scanning Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        continue-on-error: true

      - name: 🔍 SAST - Static Application Security Testing
        id: sast
        run: |
          echo "Running SAST scan..."
          
          # Mock SAST findings
          cat > sast-results.json << 'SAST_EOF'
          {
            "tool": "Checkmarx",
            "scan_time": "2026-04-14T05:35:00Z",
            "total_findings": 12,
            "critical": 2,
            "high": 4,
            "medium": 4,
            "low": 2,
            "findings": [
              {
                "severity": "CRITICAL",
                "category": "SQL Injection",
                "file": "srv/product-service.js",
                "line": 83,
                "description": "Potential SQL injection vulnerability in SELECT query",
                "cwe": "CWE-89",
                "recommendation": "Use parameterized queries with @sap/cds prepared statements"
              },
              {
                "severity": "CRITICAL",
                "category": "Command Injection",
                "file": "srv/product-service.js",
                "line": 50,
                "description": "Unsafe use of console.log with user input may expose sensitive data",
                "cwe": "CWE-78",
                "recommendation": "Sanitize user input before logging or use structured logging"
              },
              {
                "severity": "HIGH",
                "category": "Input Validation",
                "file": "srv/product-service.js",
                "line": 30,
                "description": "Missing input sanitization on currency field",
                "cwe": "CWE-20",
                "recommendation": "Apply trim().toUpperCase() normalization before validation"
              },
              {
                "severity": "HIGH",
                "category": "Sensitive Data Exposure",
                "file": "srv/product-service.js",
                "line": 97,
                "description": "Product data logged without sanitization",
                "cwe": "CWE-532",
                "recommendation": "Avoid logging sensitive business data in production"
              }
            ]
          }
          SAST_EOF
          
          cat sast-results.json
          echo "sast_total=12" >> $GITHUB_OUTPUT
          echo "sast_critical=2" >> $GITHUB_OUTPUT
          echo "sast_high=4" >> $GITHUB_OUTPUT

      - name: 🔐 SCA - Software Composition Analysis
        id: sca
        run: |
          echo "Running SCA scan..."
          
          # Mock SCA findings
          cat > sca-results.json << 'SCA_EOF'
          {
            "tool": "WhiteSource/Mend",
            "scan_time": "2026-04-14T05:36:00Z",
            "total_vulnerabilities": 8,
            "critical": 1,
            "high": 2,
            "medium": 3,
            "low": 2,
            "dependencies_scanned": 847,
            "vulnerabilities": [
              {
                "severity": "CRITICAL",
                "package": "express@4.18.2",
                "vulnerability": "CVE-2024-29041",
                "cvss": "9.8",
                "description": "Prototype pollution vulnerability in qs dependency",
                "fixed_version": "4.19.2",
                "recommendation": "Update express to version 4.19.2 or higher"
              },
              {
                "severity": "HIGH",
                "package": "@sap/cds@7.5.0",
                "vulnerability": "CVE-2024-XXXXX",
                "cvss": "7.5",
                "description": "Potential information disclosure in error handling",
                "fixed_version": "7.6.0",
                "recommendation": "Update @sap/cds to version 7.6.0"
              },
              {
                "severity": "HIGH",
                "package": "sqlite3@5.1.6",
                "vulnerability": "CVE-2023-45866",
                "cvss": "7.3",
                "description": "Memory corruption in SQL statement preparation",
                "fixed_version": "5.1.7",
                "recommendation": "Update sqlite3 to version 5.1.7"
              }
            ]
          }
          SCA_EOF
          
          cat sca-results.json
          echo "sca_total=8" >> $GITHUB_OUTPUT
          echo "sca_critical=1" >> $GITHUB_OUTPUT
          echo "sca_high=2" >> $GITHUB_OUTPUT

      - name: 🛡️ Container Security Scan
        id: container
        run: |
          echo "Running container security scan..."
          
          cat > container-results.json << 'CONTAINER_EOF'
          {
            "tool": "Trivy",
            "scan_time": "2026-04-14T05:37:00Z",
            "total_findings": 5,
            "critical": 0,
            "high": 1,
            "medium": 2,
            "low": 2,
            "findings": [
              {
                "severity": "HIGH",
                "package": "openssl",
                "version": "1.1.1k",
                "vulnerability": "CVE-2024-0727",
                "cvss": "7.5",
                "fixed_version": "1.1.1w",
                "description": "NULL pointer dereference in PKCS7 parsing"
              }
            ]
          }
          CONTAINER_EOF
          
          cat container-results.json
          echo "container_total=5" >> $GITHUB_OUTPUT

      - name: 🔎 Secret Detection
        id: secrets
        run: |
          echo "Running secret detection..."
          
          cat > secrets-results.json << 'SECRETS_EOF'
          {
            "tool": "GitGuardian",
            "scan_time": "2026-04-14T05:38:00Z",
            "secrets_found": 0,
            "files_scanned": 23,
            "status": "PASS"
          }
          SECRETS_EOF
          
          cat secrets-results.json
          echo "secrets_found=0" >> $GITHUB_OUTPUT

      - name: 📊 Generate Security Report
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const prNumber = context.issue.number || '${{ github.event.inputs.pr_number }}';
            
            // Read scan results
            const sastResults = JSON.parse(fs.readFileSync('sast-results.json', 'utf8'));
            const scaResults = JSON.parse(fs.readFileSync('sca-results.json', 'utf8'));
            const containerResults = JSON.parse(fs.readFileSync('container-results.json', 'utf8'));
            const secretsResults = JSON.parse(fs.readFileSync('secrets-results.json', 'utf8'));
            
            // Generate mock build ID
            const buildId = Math.floor(Math.random() * 90000000) + 10000000;
            const buildUrl = `https://dev.azure.com/hyperspace-pipelines/MockAI/_build/results?buildId=${buildId}&view=results`;
            
            // Calculate overall risk
            const totalCritical = sastResults.critical + scaResults.critical + containerResults.critical;
            const totalHigh = sastResults.high + scaResults.high + containerResults.high;
            const totalFindings = sastResults.total_findings + scaResults.total_vulnerabilities + containerResults.total_findings;
            
            let overallStatus = '✅ PASS';
            let riskLevel = '🟢 LOW';
            
            if (totalCritical > 0) {
              overallStatus = '❌ FAILED';
              riskLevel = '🔴 CRITICAL';
            } else if (totalHigh >= 3) {
              overallStatus = '⚠️ WARNING';
              riskLevel = '🟠 HIGH';
            } else if (totalHigh > 0) {
              overallStatus = '⚠️ WARNING';
              riskLevel = '🟡 MEDIUM';
            }
            
            // Build the security report
            const securityReport = [
              '# 🔒 Security Pipeline Results',
              '',
              '**Overall Status:** ' + overallStatus,
              '**Risk Level:** ' + riskLevel,
              '**Build ID:** [#' + buildId + '](' + buildUrl + ')',
              '**Scan Time:** ' + new Date().toISOString(),
              '',
              '<details>',
              '<summary>Pipeline Information</summary>',
              '',
              '**Pipeline:** Security Scanning',
              '**Triggered by:** Pull Request #' + prNumber,
              '**Duration:** 4m 23s',
              '**Agent:** ubuntu-latest',
              '',
              '</details>',
              '',
              '---',
              '',
              '## 📊 Security Scan Summary',
              '',
              '| Scan Type | Tool | Total | 🔴 Critical | 🟠 High | 🟡 Medium | 🟢 Low | Status |',
              '|-----------|------|-------|------------|---------|-----------|--------|--------|',
              '| SAST | Checkmarx | ' + sastResults.total_findings + ' | ' + sastResults.critical + ' | ' + sastResults.high + ' | ' + sastResults.medium + ' | ' + sastResults.low + ' | ' + (sastResults.critical > 0 ? '❌ Failed' : '⚠️ Warning') + ' |',
              '| SCA | WhiteSource | ' + scaResults.total_vulnerabilities + ' | ' + scaResults.critical + ' | ' + scaResults.high + ' | ' + scaResults.medium + ' | ' + scaResults.low + ' | ' + (scaResults.critical > 0 ? '❌ Failed' : '⚠️ Warning') + ' |',
              '| Container | Trivy | ' + containerResults.total_findings + ' | ' + containerResults.critical + ' | ' + containerResults.high + ' | ' + containerResults.medium + ' | ' + containerResults.low + ' | ✅ Pass |',
              '| Secrets | GitGuardian | ' + secretsResults.secrets_found + ' | 0 | 0 | 0 | 0 | ✅ Pass |',
              '| **Total** | | **' + totalFindings + '** | **' + totalCritical + '** | **' + totalHigh + '** | **' + (sastResults.medium + scaResults.medium + containerResults.medium) + '** | **' + (sastResults.low + scaResults.low + containerResults.low) + '** | ' + overallStatus + ' |',
              '',
              '---',
              '',
              '## 🔍 SAST Findings (Checkmarx)',
              '',
              '### 🔴 Critical Issues (' + sastResults.critical + ')',
              ''
            ];
            
            // Add SAST Critical findings
            sastResults.findings.filter(f => f.severity === 'CRITICAL').forEach(finding => {
              securityReport.push(
                '#### ' + finding.category,
                '**File:** `' + finding.file + '` (Line ' + finding.line + ')',
                '**CWE:** ' + finding.cwe,
                '',
                finding.description,
                '',
                '**Recommendation:**',
                '```javascript',
                finding.recommendation,
                '```',
                ''
              );
            });
            
            securityReport.push(
              '### 🟠 High Severity Issues (' + sastResults.high + ')',
              ''
            );
            
            // Add SAST High findings
            sastResults.findings.filter(f => f.severity === 'HIGH').forEach(finding => {
              securityReport.push(
                '#### ' + finding.category,
                '**File:** `' + finding.file + '` (Line ' + finding.line + ')',
                '**CWE:** ' + finding.cwe + ' | ' + finding.description,
                '',
                '💡 **Fix:** ' + finding.recommendation,
                ''
              );
            });
            
            securityReport.push(
              '---',
              '',
              '## 🔐 SCA Findings (WhiteSource/Mend)',
              '',
              '**Dependencies Scanned:** ' + scaResults.dependencies_scanned,
              '',
              '### Vulnerable Dependencies',
              ''
            );
            
            // Add SCA findings
            scaResults.vulnerabilities.forEach(vuln => {
              const severityIcon = vuln.severity === 'CRITICAL' ? '🔴' : '🟠';
              securityReport.push(
                '#### ' + severityIcon + ' ' + vuln.package,
                '**Vulnerability:** ' + vuln.vulnerability + ' (CVSS: ' + vuln.cvss + ')',
                '**Severity:** ' + vuln.severity,
                '',
                vuln.description,
                '',
                '**Fix Available:** Yes - Update to `' + vuln.fixed_version + '`',
                '',
                '```bash',
                'npm install ' + vuln.package.split('@')[0] + '@' + vuln.fixed_version,
                '```',
                ''
              );
            });
            
            securityReport.push(
              '---',
              '',
              '## 🛡️ Container Security (Trivy)',
              '',
              '**Status:** ' + (containerResults.critical === 0 ? '✅ No critical vulnerabilities' : '❌ Critical vulnerabilities found'),
              '',
              containerResults.findings.map(f => 
                '- **' + f.severity + '**: ' + f.package + ' (' + f.vulnerability + ') - Fix: Update to ' + f.fixed_version
              ).join('\n'),
              '',
              '---',
              '',
              '## 🔎 Secret Detection (GitGuardian)',
              '',
              '**Status:** ✅ No secrets detected',
              '**Files Scanned:** ' + secretsResults.files_scanned,
              '',
              '---',
              '',
              '## ⚖️ Compliance & Policy',
              '',
              '### Security Gate Status',
              '',
              '| Policy | Threshold | Current | Status |',
              '|--------|-----------|---------|--------|',
              '| Critical Issues | 0 | ' + totalCritical + ' | ' + (totalCritical === 0 ? '✅ Pass' : '❌ **BLOCKED**') + ' |',
              '| High Severity | ≤ 2 | ' + totalHigh + ' | ' + (totalHigh <= 2 ? '✅ Pass' : '⚠️ Warning') + ' |',
              '| Secrets Detected | 0 | ' + secretsResults.secrets_found + ' | ✅ Pass |',
              '| Code Coverage | ≥ 80% | 50% | ⚠️ Below threshold |',
              '',
              '### 🚨 Merge Blocker',
              ''
            );
            
            if (totalCritical > 0) {
              securityReport.push(
                '**Status:** ❌ **BLOCKED - Cannot merge**',
                '',
                'This PR contains **' + totalCritical + ' CRITICAL** security issues that must be resolved before merging.',
                '',
                '**Required Actions:**',
                '1. Fix all CRITICAL SAST findings in `srv/product-service.js`',
                '2. Update vulnerable dependencies (express, @sap/cds, sqlite3)',
                '3. Re-run security pipeline after fixes',
                ''
              );
            } else if (totalHigh >= 3) {
              securityReport.push(
                '**Status:** ⚠️ **WARNING - Review required**',
                '',
                'This PR contains ' + totalHigh + ' HIGH severity issues. Security review recommended before merge.',
                ''
              );
            } else {
              securityReport.push(
                '**Status:** ✅ **APPROVED - May proceed**',
                '',
                'All security gates passed. Minor issues should be addressed in follow-up.',
                ''
              );
            }
            
            securityReport.push(
              '---',
              '',
              '## 📋 Detailed Reports',
              '',
              '- 📊 [Full Build Results](' + buildUrl + ')',
              '- 🔍 [SAST Report](' + buildUrl + '&tab=sast)',
              '- 🔐 [SCA Report](' + buildUrl + '&tab=sca)',
              '- 🛡️ [Container Scan](' + buildUrl + '&tab=container)',
              '- 🔎 [Secret Detection](' + buildUrl + '&tab=secrets)',
              '',
              '---',
              '',
              '*Security pipeline powered by Azure DevOps | Build #' + buildId + '*'
            );
            
            // Post the security report
            await github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: securityReport.join('\n')
            });

            // Add security labels
            const labels = ['security-scanned'];
            if (totalCritical > 0) {
              labels.push('security-critical', 'blocked');
            } else if (totalHigh >= 3) {
              labels.push('security-warning');
            }

            await github.rest.issues.addLabels({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: labels
            });

      - name: Assign Reviewers on Security Failure
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const prNumber = context.issue.number || '${{ github.event.inputs.pr_number }}';

            // Read scan results
            const sastResults = JSON.parse(fs.readFileSync('sast-results.json', 'utf8'));
            const scaResults = JSON.parse(fs.readFileSync('sca-results.json', 'utf8'));
            const containerResults = JSON.parse(fs.readFileSync('container-results.json', 'utf8'));

            const totalCritical = sastResults.critical + scaResults.critical + containerResults.critical;
            const totalHigh = sastResults.high + scaResults.high + containerResults.high;

            // Only assign if security failed
            if (totalCritical > 0 || totalHigh >= 3) {
              const prAuthor = context.payload.pull_request.user.login;

              // Post assignment comment
              const assignmentComment = [
                '## 🚨 Security Review Required',
                '',
                '**Status:** Security scan ' + (totalCritical > 0 ? 'FAILED with CRITICAL issues' : 'WARNING - High severity issues detected'),
                '',
                '### Assigned Reviewers',
                '',
                '- 👤 **PR Author:** @' + prAuthor + ' - Please address the security findings',
                '- 🛡️ **Security Contact:** @security-team-lead - Security review required',
                '',
                '### Quick Fix Guide',
                '',
                '#### 1. SAST Issues (Code Vulnerabilities)',
                ''
              ];

              // Add SAST fixes
              sastResults.findings.filter(f => f.severity === 'CRITICAL' || f.severity === 'HIGH').forEach((finding, index) => {
                assignmentComment.push(
                  '**Issue ' + (index + 1) + ':** ' + finding.category + ' at `' + finding.file + ':' + finding.line + '`',
                  '',
                  '```javascript',
                  '// ' + finding.description,
                  finding.recommendation,
                  '```',
                  ''
                );
              });

              assignmentComment.push(
                '#### 2. SCA Issues (Vulnerable Dependencies)',
                '',
                'Update the following packages in `package.json`:',
                '',
                '```bash',
                '# Critical and High severity fixes'
              );

              // Add SCA fixes
              scaResults.vulnerabilities.filter(v => v.severity === 'CRITICAL' || v.severity === 'HIGH').forEach(vuln => {
                const pkgName = vuln.package.split('@')[0];
                assignmentComment.push('npm install ' + pkgName + '@' + vuln.fixed_version + '  # Fixes ' + vuln.vulnerability);
              });

              assignmentComment.push(
                '```',
                '',
                '#### 3. Re-run Security Scan',
                '',
                'After applying fixes:',
                '1. Commit and push changes',
                '2. Security pipeline will automatically re-run',
                '3. PR will be unblocked if all CRITICAL issues are resolved',
                '',
                '---',
                '',
                '**Next Steps:**',
                '1. @' + prAuthor + ' - Apply the fixes above',
                '2. @security-team-lead - Review after fixes applied',
                '3. Re-run pipeline: Push new commit or comment `/rerun-security`',
                '',
                '**Estimated Fix Time:** ' + (totalCritical * 15 + totalHigh * 10) + ' minutes',
                ''
              );

              // Post the assignment comment
              await github.rest.issues.createComment({
                issue_number: prNumber,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: assignmentComment.join('\n')
              });

              // Assign PR to author and add to assignees
              try {
                // Add PR author as assignee
                await github.rest.issues.addAssignees({
                  issue_number: prNumber,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  assignees: [prAuthor]
                });
                console.log('Added ' + prAuthor + ' as assignee');
              } catch (error) {
                console.log('Could not add assignee:', error.message);
              }

              // Try to request review from security team
              // Note: This requires the reviewer to be a collaborator
              // For demo purposes, we're using the PR author as a fallback
              try {
                await github.rest.pulls.requestReviewers({
                  pull_number: prNumber,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  reviewers: [prAuthor], // In production: replace with actual security team member usernames
                  team_reviewers: [] // Can add team slugs here if using GitHub teams
                });
                console.log('Requested review from ' + prAuthor);
              } catch (error) {
                console.log('Could not request review:', error.message);
                // Fallback: Just log that we mentioned them in the comment
                console.log('Security contact @security-team-lead mentioned in comment');
              }
            }

