name: 🚀 Hyperspace Bot - AI PR Analysis

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - master

permissions:
  contents: read
  pull-requests: write
  checks: write
  issues: write

jobs:
  hyperspace-analysis:
    name: Hyperspace Bot Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR Files
        id: pr-files
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            core.setOutput('file_count', files.length);
            core.setOutput('additions', pr.additions);
            core.setOutput('deletions', pr.deletions);
            core.setOutput('changed_files', pr.changed_files);
            core.setOutput('head_sha', pr.head.sha);

            return files;

      - name: Post Inline Code Suggestions
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.issue.number;
            const headSha = '${{ steps.pr-files.outputs.head_sha }}';

            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            const changedFiles = files.map(f => f.filename);
            const suggestions = [];

            // SAP CAP-specific suggestions for rating feature
            if (changedFiles.includes('srv/product-service.js')) {
              const productServiceFile = files.find(f => f.filename === 'srv/product-service.js');
              if (productServiceFile && productServiceFile.patch.includes('updateRating')) {
                suggestions.push({
                  path: 'srv/product-service.js',
                  line: 185,
                  side: 'RIGHT',
                  body: '**Performance**: Validate rating parameter before database query to avoid unnecessary round-trips for invalid inputs.\n\n````suggestion\n// Validate early\nif (rating < config.rating.min || rating > config.rating.max) {\n  return req.error(400, `Rating must be between ${config.rating.min} and ${config.rating.max}`);\n}\nconst product = await SELECT.one.from(Products).where({ ID });\n````'
                });

                suggestions.push({
                  path: 'srv/product-service.js',
                  line: 192,
                  side: 'RIGHT',
                  body: '**Best Practice**: Document the weighted average calculation for maintainability.\n\n````suggestion\n// Weighted average: (oldAvg * oldCount + newRating) / (oldCount + 1)\nconst currentTotal = product.rating * product.reviewCount;\nconst newReviewCount = product.reviewCount + 1;\nconst newRating = ((currentTotal + rating) / newReviewCount).toFixed(2);\n````'
                });
              }
            }

            // Post suggestions
            for (const suggestion of suggestions) {
              try {
                await github.rest.pulls.createReviewComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                  commit_id: headSha,
                  path: suggestion.path,
                  line: suggestion.line,
                  side: suggestion.side,
                  body: suggestion.body
                });
                console.log(`Posted suggestion for ${suggestion.path}:${suggestion.line}`);
              } catch (error) {
                console.log(`Failed to post suggestion: ${error.message}`);
              }
            }

      - name: Post PR Summary
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.issue.number;
            const fileCount = ${{ steps.pr-files.outputs.file_count }};
            const additions = ${{ steps.pr-files.outputs.additions }};
            const deletions = ${{ steps.pr-files.outputs.deletions }};

            const summary = `## ✅ Hyperspace Bot Analysis Complete

**Files Changed:** ${fileCount} | **Lines:** +${additions} / -${deletions}

This PR adds SAP CAP rating functionality with proper validation and error handling. Changes follow SAP best practices for CDS entity extensions and OData bound actions.

**SAP CAP Patterns Detected:**
- ✅ CDS entity extension with proper defaults
- ✅ OData bound action (updateRating)
- ✅ CQL queries (SELECT, UPDATE)
- ✅ Structured logging with cds.log
- ✅ Configuration-driven validation
- ✅ Proper error handling with HTTP status codes

**Impact Assessment:**
- **Breaking Change:** No - new fields have defaults, new action is additive
- **OData Metadata:** Extended with new properties and action
- **Database:** Two new columns (rating, reviewCount)

View inline suggestions in the **Files changed** tab for optimization opportunities.`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: summary
            });
