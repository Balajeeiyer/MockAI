name: 🚀 Hyperspace Bot - AI PR Analysis

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - master

permissions:
  contents: read
  pull-requests: write
  checks: write
  issues: write

jobs:
  hyperspace-analysis:
    name: Hyperspace Bot Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR Files
        id: pr-files
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            core.setOutput('file_count', files.length);
            core.setOutput('additions', pr.additions);
            core.setOutput('deletions', pr.deletions);
            core.setOutput('changed_files', pr.changed_files);
            core.setOutput('head_sha', pr.head.sha);

            return files;

      - name: Post Inline Code Suggestions
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.issue.number;
            const headSha = '${{ steps.pr-files.outputs.head_sha }}';

            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            const changedFiles = files.map(f => f.filename);
            const suggestions = [];

            // SAP CAP-specific suggestions for rating feature
            if (changedFiles.includes('srv/product-service.js')) {
              const productServiceFile = files.find(f => f.filename === 'srv/product-service.js');
              if (productServiceFile && productServiceFile.patch.includes('updateRating')) {
                suggestions.push({
                  path: 'srv/product-service.js',
                  line: 185,
                  side: 'RIGHT',
                  body: '**Performance**: Validate rating parameter before database query to avoid unnecessary round-trips for invalid inputs.\n\n````suggestion\n// Validate early\nif (rating < config.rating.min || rating > config.rating.max) {\n  return req.error(400, `Rating must be between ${config.rating.min} and ${config.rating.max}`);\n}\nconst product = await SELECT.one.from(Products).where({ ID });\n````'
                });

                suggestions.push({
                  path: 'srv/product-service.js',
                  line: 192,
                  side: 'RIGHT',
                  body: '**Best Practice**: Document the weighted average calculation for maintainability.\n\n````suggestion\n// Weighted average: (oldAvg * oldCount + newRating) / (oldCount + 1)\nconst currentTotal = product.rating * product.reviewCount;\nconst newReviewCount = product.reviewCount + 1;\nconst newRating = ((currentTotal + rating) / newReviewCount).toFixed(2);\n````'
                });
              }
            }

            // Post suggestions
            for (const suggestion of suggestions) {
              try {
                await github.rest.pulls.createReviewComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                  commit_id: headSha,
                  path: suggestion.path,
                  line: suggestion.line,
                  side: suggestion.side,
                  body: suggestion.body
                });
                console.log(`Posted suggestion for ${suggestion.path}:${suggestion.line}`);
              } catch (error) {
                console.log(`Failed to post suggestion: ${error.message}`);
              }
            }

      - name: Post PR Summary
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.issue.number;
            const fileCount = ${{ steps.pr-files.outputs.file_count }};
            const additions = ${{ steps.pr-files.outputs.additions }};
            const deletions = ${{ steps.pr-files.outputs.deletions }};

            const summary = '## ✅ Hyperspace Bot Analysis Complete\n\n' +
              '**Files Changed:** ' + fileCount + ' | **Lines:** +' + additions + ' / -' + deletions + '\n\n' +
              'This PR adds SAP CAP rating functionality with proper validation and error handling. Changes follow SAP best practices for CDS entity extensions and OData bound actions.\n\n' +
              '**SAP CAP Patterns Detected:**\n' +
              '- ✅ CDS entity extension with proper defaults\n' +
              '- ✅ OData bound action (updateRating)\n' +
              '- ✅ CQL queries (SELECT, UPDATE)\n' +
              '- ✅ Structured logging with cds.log\n' +
              '- ✅ Configuration-driven validation\n' +
              '- ✅ Proper error handling with HTTP status codes\n\n' +
              '**Impact Assessment:**\n' +
              '- **Breaking Change:** No - new fields have defaults, new action is additive\n' +
              '- **OData Metadata:** Extended with new properties and action\n' +
              '- **Database:** Two new columns (rating, reviewCount)\n\n' +
              'View inline suggestions in the **Files changed** tab for optimization opportunities.';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: summary
            });

  cross-repo-dispatcher:
    name: Dispatch Integration Tests to Dependent Repos
    runs-on: ubuntu-latest
    needs: hyperspace-analysis
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check for API changes
        id: check-changes
        run: |
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          API_FILES=$(echo "$CHANGED_FILES" | grep -E '(srv/.*\.cds|srv/.*\.js|db/schema\.cds)' || true)

          if [ -n "$API_FILES" ]; then
            echo "api_changed=true" >> $GITHUB_OUTPUT
            echo "API files changed: $API_FILES"
          else
            echo "api_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Read dependent repos config
        if: steps.check-changes.outputs.api_changed == 'true'
        id: read-config
        run: |
          if [ ! -f ".github/dependent-repos.yml" ]; then
            echo "repos=[]" >> $GITHUB_OUTPUT
            exit 0
          fi

          npm install --no-save js-yaml
          node << 'EOF'
            const yaml = require('js-yaml');
            const fs = require('fs');
            const config = yaml.load(fs.readFileSync('.github/dependent-repos.yml', 'utf8'));
            const repos = config.dependent_repos || [];
            fs.appendFileSync(process.env.GITHUB_OUTPUT, 'repos=' + JSON.stringify(repos) + '\n');
EOF

      - name: Dispatch to dependent repos
        if: steps.check-changes.outputs.api_changed == 'true' && steps.read-config.outputs.repos != '[]'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPOS='${{ steps.read-config.outputs.repos }}'

          echo "$REPOS" | node << 'EOF'
            const repos = JSON.parse(require('fs').readFileSync(0, 'utf-8'));
            const { execSync } = require('child_process');

            repos.forEach(repo => {
              const payload = {
                source_repo: '${{ github.repository }}',
                source_pr: ${{ github.event.pull_request.number }},
                source_branch: '${{ github.head_ref }}',
                source_sha: '${{ github.event.pull_request.head.sha }}',
                pr_url: '${{ github.event.pull_request.html_url }}',
                pr_title: '${{ github.event.pull_request.title }}',
                triggered_by: '${{ github.actor }}',
                dependencies: repo.dependencies,
                critical: repo.critical || false
              };

              console.log(`Dispatching to ${repo.repository}...`);
              console.log('Payload:', JSON.stringify(payload, null, 2));

              try {
                const payloadJson = JSON.stringify(payload);
                const cmd = `gh api repos/${repo.repository}/dispatches -f event_type=external-integration-test -f 'client_payload=${payloadJson}'`;
                console.log('Command:', cmd);
                execSync(cmd, {stdio: 'inherit', env: process.env});
                console.log(`✓ Dispatched to ${repo.repository}`);
              } catch (error) {
                console.error(`✗ Failed to dispatch to ${repo.repository}:`, error.message);
              }
            });
EOF

      - name: Create tracking comment
        if: steps.check-changes.outputs.api_changed == 'true' && steps.read-config.outputs.repos != '[]'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const repos = JSON.parse('${{ steps.read-config.outputs.repos }}');
            const repoList = repos.map(r => '- [' + r.name + '](https://github.com/' + r.repository + ') - Estimated: ' + r.estimated_duration + 's').join('\n');

            const comment = '## 🔄 Cross-Repository Integration Tests Triggered\n\n' +
              'API changes detected in this PR. Integration tests dispatched to **' + repos.length + '** dependent repository(ies).\n\n' +
              '### Dependent Repositories:\n' + repoList + '\n\n' +
              '**Note:** Test results will be reported back to this PR via GitHub Checks API.\n\n' +
              '---\n*Dispatched by Cross-Repository Integration Testing System*';

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
