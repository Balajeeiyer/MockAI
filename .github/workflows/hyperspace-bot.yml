                  '**Implementation Time**: 5 minutes',
                  '**Priority**: IMMEDIATE - Block merge until fixed',
                  '',
                  '_Commit this suggestion immediately to prevent SQL injection attacks._',
                  '<!-- PR-Bot Feedback-Section-Start -->',
                  '---',
                  '_Please provide feedback on the review comment by checking the appropriate box:_',
                  '',
                  '- [ ] <!-- PR-Bot Feedback Awesome --> 🌟 Awesome comment, a human might have missed that.',
                  '- [ ] <!-- PR-Bot Feedback Helpful --> ✅ Helpful comment',
                  '- [ ] <!-- PR-Bot Feedback Neutral --> 🤷 Neutral',
                  '- [ ] <!-- PR-Bot Feedback Not helpful --> ❌ This comment is not helpful<!-- PR-Bot Feedback-Section-End -->'
                ].join('\n')
              },
              {
                path: 'srv/analytics-service.js',
                line: 32,
                side: 'RIGHT',
                body: [
                  '**🔴 CRITICAL SECURITY**: Command Injection Vulnerability',
                  '',
                  '**Severity**: CRITICAL | **CVSS**: 9.8 | **CWE-78**',
                  '',
                  'User input in shell commands allows command injection attacks. An attacker could execute arbitrary system commands.',
                  '',
                  '**Attack Example**: `filename = "output.csv; rm -rf / #"`',
                  '',
                  '**Fix**: Use Node.js file system APIs instead of shell commands:',
                  '````suggestion',
                  '    // SECURITY FIX: Use fs module instead of shell commands',
                  '    const { filename } = req.data;',
                  '    const fs = require(\'fs\').promises;',
                  '    const path = require(\'path\');',
                  '    ',
                  '    // Sanitize filename and use safe path',
                  '    const safeFilename = path.basename(filename).replace(/[^a-zA-Z0-9._-]/g, \'\');',
                  '    const outputPath = path.join(\'/tmp\', safeFilename);',
                  '    ',
                  '    try {',
                  '      await fs.copyFile(\'products.csv\', outputPath);',
                  '      return { message: \'Export completed\', file: safeFilename };',
                  '    } catch (error) {',
                  '      console.error(`Export failed: ${error.message}`);',
                  '      throw new Error(\'Export failed\');',
                  '    }',
                  '````',
                  '',
                  '**Implementation Time**: 10 minutes',
                  '**Priority**: IMMEDIATE',
                  '',
                  '_Commit this suggestion immediately to prevent command injection attacks._',
                  '<!-- PR-Bot Feedback-Section-Start -->',
                  '---',
                  '_Please provide feedback on the review comment by checking the appropriate box:_',
                  '',
                  '- [ ] <!-- PR-Bot Feedback Awesome --> 🌟 Awesome comment, a human might have missed that.',
                  '- [ ] <!-- PR-Bot Feedback Helpful --> ✅ Helpful comment',
                  '- [ ] <!-- PR-Bot Feedback Neutral --> 🤷 Neutral',
                  '- [ ] <!-- PR-Bot Feedback Not helpful --> ❌ This comment is not helpful<!-- PR-Bot Feedback-Section-End -->'
                ].join('\n')
              },
              {
                path: 'srv/analytics-service.js',
                line: 46,
                side: 'RIGHT',
                body: [
                  '**🔴 HIGH SECURITY**: Missing Authentication - Unauthenticated Destructive Operation',
                  '',
                  '**Severity**: HIGH | **CVSS**: 8.2 | **CWE-306**',
                  '',
                  'The `deleteAllProducts` operation has no authentication or authorization checks. Any user can delete all products from the system.',
                  '',
                  '**Fix**: Add authentication and authorization:',
                  '````suggestion',
                  '    // SECURITY FIX: Add authentication and authorization checks',
                  '    this.on(\'deleteAllProducts\', async (req) => {',
                  '      // Check if user is authenticated',
                  '      if (!req.user || !req.user.id) {',
                  '        return req.error(401, \'Authentication required\');',
                  '      }',
                  '      ',
                  '      // Check if user has admin role',
                  '      if (!req.user.roles || !req.user.roles.includes(\'admin\')) {',
                  '        return req.error(403, \'Insufficient permissions - admin role required\');',
                  '      }',
                  '      ',
                  '      await DELETE.from(\'Products\');',
                  '      console.log(`All products deleted by admin user ${req.user.id}`);',
                  '      return { message: \'All products deleted\' };',
                  '    });',
                  '````',
                  '',
                  '**Implementation Time**: 7 minutes',
                  '**Priority**: HIGH',
                  '',
                  '_Commit this suggestion to add proper authentication and authorization._',
                  '<!-- PR-Bot Feedback-Section-Start -->',
                  '---',
                  '_Please provide feedback on the review comment by checking the appropriate box:_',
                  '',
                  '- [ ] <!-- PR-Bot Feedback Awesome --> 🌟 Awesome comment, a human might have missed that.',
                  '- [ ] <!-- PR-Bot Feedback Helpful --> ✅ Helpful comment',
                  '- [ ] <!-- PR-Bot Feedback Neutral --> 🤷 Neutral',
                  '- [ ] <!-- PR-Bot Feedback Not helpful --> ❌ This comment is not helpful<!-- PR-Bot Feedback-Section-End -->'
                ].join('\n')
              },
              {
                path: 'srv/analytics-service.js',
                line: 71,
                side: 'RIGHT',
                body: [
                  '**🔴 CRITICAL SECURITY**: Information Disclosure - Exposing Environment Variables',
                  '',
                  '**Severity**: CRITICAL | **CVSS**: 9.1 | **CWE-200**',
                  '',
                  'Exposing `process.env` reveals all environment variables including sensitive data like API keys, database passwords, and secrets.',
                  '',
                  '**Fix**: Remove sensitive information from response:',
                  '````suggestion',
                  '      // SECURITY FIX: Return only safe, non-sensitive system information',
                  '      return {',
                  '        nodeVersion: process.version,',
                  '        platform: process.platform,',
                  '        uptime: Math.floor(process.uptime()),',
                  '        memoryUsage: {',
                  '          heapUsed: Math.round(process.memoryUsage().heapUsed / 1024 / 1024) + \'MB\',',
                  '          heapTotal: Math.round(process.memoryUsage().heapTotal / 1024 / 1024) + \'MB\'',
                  '        }',
                  '      };',
                  '````',
                  '',
                  '**Implementation Time**: 3 minutes',
                  '**Priority**: IMMEDIATE',
                  '',
                  '_Commit this suggestion immediately to prevent exposure of sensitive environment variables._',
                  '<!-- PR-Bot Feedback-Section-Start -->',
                  '---',
                  '_Please provide feedback on the review comment by checking the appropriate box:_',
                  '',
                  '- [ ] <!-- PR-Bot Feedback Awesome --> 🌟 Awesome comment, a human might have missed that.',
                  '- [ ] <!-- PR-Bot Feedback Helpful --> ✅ Helpful comment',
                  '- [ ] <!-- PR-Bot Feedback Neutral --> 🤷 Neutral',
                  '- [ ] <!-- PR-Bot Feedback Not helpful --> ❌ This comment is not helpful<!-- PR-Bot Feedback-Section-End -->'
                ].join('\n')
              },
              {
                path: 'srv/config.js',
                line: 10,
                side: 'RIGHT',
                body: [
                  '**🔴 CRITICAL SECURITY**: Hardcoded Database Credentials',
                  '',
                  '**Severity**: CRITICAL | **CVSS**: 9.8 | **CWE-798**',
                  '',
                  'Database credentials should never be hardcoded in source code. This exposes sensitive credentials in version control and makes credential rotation impossible.',
                  '',
                  '**Fix**: Use environment variables:',
                  '````suggestion',
                  '  // SECURITY FIX: Use environment variables for sensitive credentials',
                  '  database: {',
                  '    host: process.env.DB_HOST || \'localhost\',',
                  '    user: process.env.DB_USER || \'user\',',
                  '    password: process.env.DB_PASSWORD, // Never hardcode passwords!',
                  '    database: process.env.DB_NAME || \'products_db\',',
                  '    port: parseInt(process.env.DB_PORT || \'5432\')',
                  '  },',
                  '````',
                  '',
                  '**Additional Steps**:',
                  '1. Add to `.gitignore`: `.env`',
                  '2. Create `.env.example` with placeholder values',
                  '3. Document required environment variables in README',
                  '',
                  '**Implementation Time**: 8 minutes',
                  '**Priority**: IMMEDIATE',
                  '',
                  '_Commit this suggestion and remove hardcoded credentials from git history._',
                  '<!-- PR-Bot Feedback-Section-Start -->',
                  '---',
                  '_Please provide feedback on the review comment by checking the appropriate box:_',
                  '',
                  '- [ ] <!-- PR-Bot Feedback Awesome --> 🌟 Awesome comment, a human might have missed that.',
                  '- [ ] <!-- PR-Bot Feedback Helpful --> ✅ Helpful comment',
                  '- [ ] <!-- PR-Bot Feedback Neutral --> 🤷 Neutral',
                  '- [ ] <!-- PR-Bot Feedback Not helpful --> ❌ This comment is not helpful<!-- PR-Bot Feedback-Section-End -->'
                ].join('\n')
              },
              {
                path: 'srv/config.js',
                line: 18,
                side: 'RIGHT',
                body: [
                  '**🔴 HIGH SECURITY**: Hardcoded API Keys',
                  '',
                  '**Severity**: HIGH | **CVSS**: 8.2 | **CWE-798**',
                  '',
                  'API keys should never be hardcoded. This exposes credentials and prevents secure key rotation.',
                  '',
                  '**Fix**: Use environment variables:',
                  '````suggestion',
                  '  // SECURITY FIX: Use environment variables for API keys',
                  '  apiKeys: {',
                  '    paymentGateway: process.env.PAYMENT_API_KEY,',
                  '    cloudStorage: {',
                  '      accessKeyId: process.env.CLOUD_ACCESS_KEY_ID,',
                  '      secretAccessKey: process.env.CLOUD_SECRET_KEY',
                  '    },',
                  '    emailService: process.env.EMAIL_API_KEY',
                  '  },',
                  '````',
                  '',
                  '**Implementation Time**: 5 minutes',
                  '**Priority**: HIGH',
                  '',
                  '_Commit this suggestion to protect API keys._',
                  '<!-- PR-Bot Feedback-Section-Start -->',
                  '---',
                  '_Please provide feedback on the review comment by checking the appropriate box:_',
                  '',
                  '- [ ] <!-- PR-Bot Feedback Awesome --> 🌟 Awesome comment, a human might have missed that.',
                  '- [ ] <!-- PR-Bot Feedback Helpful --> ✅ Helpful comment',
                  '- [ ] <!-- PR-Bot Feedback Neutral --> 🤷 Neutral',
                  '- [ ] <!-- PR-Bot Feedback Not helpful --> ❌ This comment is not helpful<!-- PR-Bot Feedback-Section-End -->'
                ].join('\n')
              }
            ];

            // Post each suggestion as a review comment
            for (const suggestion of suggestions) {
              try {
                await github.rest.pulls.createReviewComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                  commit_id: headSha,
                  path: suggestion.path,
                  line: suggestion.line,
                  side: suggestion.side,
                  body: suggestion.body
                });
                console.log(`Posted suggestion for ${suggestion.path}:${suggestion.line}`);
              } catch (error) {
                console.log(`Failed to post suggestion for ${suggestion.path}:${suggestion.line}`, error.message);
              }
