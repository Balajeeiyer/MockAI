name: 🚀 Hyperspace Bot - AI PR Analysis

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - master

permissions:
  contents: read
  pull-requests: write
  checks: write
  issues: write

jobs:
  hyperspace-analysis:
    name: Hyperspace Bot Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR Files
        id: pr-files
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            core.setOutput('file_count', files.length);
            core.setOutput('additions', pr.additions);
            core.setOutput('deletions', pr.deletions);
            core.setOutput('changed_files', pr.changed_files);
            core.setOutput('head_sha', pr.head.sha);

            return files;

      - name: Post Inline Code Suggestions
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.issue.number;
            const headSha = '${{ steps.pr-files.outputs.head_sha }}';

            // Define suggestions for specific lines in actual PR files
            const suggestions = [
              {
                path: 'srv/product-service.cds',
                line: 15,
                side: 'RIGHT',
                body: [
                  '**💡 SUGGESTION**: Consider adding validation annotations',
                  '',
                  'The Products projection could benefit from input validation annotations to ensure data quality.',
                  '',
                  '**Enhancement**: Add validation to fields:',
                  '````suggestion',
                  '  entity Products as projection on db.Products {',
                  '    *,',
                  '    virtual available : Boolean  // Computed field: isActive && stock > 0',
                  '  } actions {',
                  '    @(requires: \'authenticated-user\')',
                  '    action updateStock(quantity : Integer not null) returns Products;',
                  '````',
                  '',
                  '**Benefits**: Stronger type safety and better API documentation',
                  '---',
                  '_Feedback appreciated!_'
                ].join('\n')
              },
              {
                path: 'srv/product-service.js',
                line: 97,
                side: 'RIGHT',
                body: [
                  '**✅ GOOD PRACTICE**: Virtual field implementation',
                  '',
                  'Well done! The `available` field is properly computed as a virtual field combining both active status and stock availability.',
                  '',
                  '**Optional Enhancement**: Consider adding this to analytics:',
                  '```javascript',
                  '// Track availability changes for reporting',
                  'product.availabilityChanged = ',
                  '  product.available !== (product.wasActive && product.previousStock > 0);',
                  '```',
                  '',
                  '**Benefits**: Historical tracking for inventory management',
                  '---',
                  '_This is an optional enhancement, current implementation is solid!_'
                ].join('\n')
              }
            ];

            // Post each suggestion as a review comment
            for (const suggestion of suggestions) {
              try {
                await github.rest.pulls.createReviewComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                  commit_id: headSha,
                  path: suggestion.path,
                  line: suggestion.line,
                  side: suggestion.side,
                  body: suggestion.body
                });
                console.log(`Posted suggestion for ${suggestion.path}:${suggestion.line}`);
              } catch (error) {
                console.log(`Failed to post suggestion for ${suggestion.path}:${suggestion.line}`, error.message);
              }
            }

      - name: Analyze Code and Post Review
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.issue.number;
            const prTitle = context.payload.pull_request.title;
            const fileCount = ${{ steps.pr-files.outputs.file_count }};
            const additions = ${{ steps.pr-files.outputs.additions }};
            const deletions = ${{ steps.pr-files.outputs.deletions }};

            // Generate correlation ID
            const correlationId = require('crypto').randomUUID();

            // Analysis summary
            const summary = 'This PR adds currency validation logic with hardcoded configuration. It contains input sanitization issues that should be resolved before merging: missing trim/uppercase normalization on currency input (line 28-32 in srv/product-service.js), hardcoded currency list that should be externalized to config, and potential injection vulnerabilities from unvalidated user input.';

            // Build the consolidated review comment
            const reviewBody = [
              '## 🚀 Hyperspace Bot - Automated PR Analysis',
              '',
              '**Status**: ✅ **Analysis Complete**',
              '',
              summary,
              '',
              '<details>',
              '<summary>PR Bot Information</summary>',
              '',
              '**Version:** `1.0.0` | 📖 [Documentation](https://github.com/Balajeeiyer/MockAI/blob/main/.github/HYPERSPACE_BOT.md) | 💬 [Feedback](https://github.com/Balajeeiyer/MockAI/issues)',
              '',
              '- Event Trigger: `pull_request.' + context.payload.action + '`',
              '- LLM: `anthropic--claude-4.6-sonnet`',
              '- Correlation ID: `' + correlationId + '`',
              '- Files Changed: ' + fileCount,
              '- Lines: +' + additions + ' / -' + deletions,
              '',
              '</details>',
              '',
              '---',
              '',
              '## 📊 Analysis Summary',
              '',
              '### Files Changed',
              '',
              '- `srv/product-service.cds` - Service definitions updated',
              '- `srv/product-service.js` - Business logic enhanced',
              '- Additional files may be analyzed in inline comments',
              '',
              '---',
              '',
              '---',
              '',
              '## ⚖️ Final Recommendation',
              '',
              '**Decision:** ✅ **REVIEW RECOMMENDED**',
              '',
              '### Next Steps',
              '',
              '1. Review the analysis summary above',
              '2. Check the **Files changed** tab for inline code review comments',
              '3. Address any findings before merging',
              '4. Run tests to verify changes: `npm test`',
              '5. Run linting to check code style: `npm run lint`',
              '',
              '---',
              '',
              '## 📋 PR Checklist',
              '',
              '- [ ] Code changes reviewed',
              '- [ ] Unit tests updated and passing',
              '- [ ] Code follows project style guidelines',
              '- [ ] Documentation updated if needed',
              '- [ ] Ready for code review',
              '',
              '---',
              '',
              '*✅ Automated analysis complete. Review the findings above and address any issues before merging.*'
            ].join('\n');

            // Post the consolidated review
            await github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: reviewBody
            });

      - name: Request Reviews from Bots
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
              await github.rest.issues.addLabels({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: [
                  'hyperspace-analyzed',
                  'code-quality-review',
                  'security-review',
                  'build-check',
                  'changes-required'
                ]
              });

              console.log('Added review stage labels');
            } catch (error) {
              console.log('Error adding labels:', error.message);
            }

            // Assign PR to author for review
            try {
              const prAuthor = context.payload.pull_request.user.login;

              await github.rest.issues.addAssignees({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                assignees: [prAuthor]
              });

              console.log('Added ' + prAuthor + ' as assignee');
            } catch (error) {
              console.log('Could not add assignee:', error.message);
            }

            // Request review (using PR author as reviewer for demo)
            // In production: replace with actual code reviewer usernames
            try {
              const prAuthor = context.payload.pull_request.user.login;

              // Note: Can't request review from PR author, so this is for demo only
              // In production, use actual reviewer usernames
              console.log('Would request review from code-quality-bot, security-scan-bot, build-analyzer-bot');
            } catch (error) {
              console.log('Could not request review:', error.message);
            }

      - name: Update PR Status
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
              await github.rest.repos.createCommitStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                sha: context.payload.pull_request.head.sha,
                state: 'failure',
                context: 'Hyperspace Bot / Code Analysis',
                description: 'Changes required - see PR comments',
                target_url: 'https://github.com/' + context.repo.owner + '/' + context.repo.repo + '/pull/' + context.issue.number
              });
            } catch (error) {
              console.log('Could not set commit status (permissions):', error.message);
            }
