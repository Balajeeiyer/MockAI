      - name: Analyze Code and Post Review
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.issue.number;
            const prTitle = context.payload.pull_request.title;
            const fileCount = ${{ steps.pr-files.outputs.file_count }};
            const additions = ${{ steps.pr-files.outputs.additions }};
            const deletions = ${{ steps.pr-files.outputs.deletions }};

            // Generate correlation ID
            const correlationId = require('crypto').randomUUID();

            // Analysis summary
            const summary = 'This PR adds currency validation logic with hardcoded configuration. It contains input sanitization issues that should be resolved before merging: missing trim/uppercase normalization on currency input (line 28-32 in srv/product-service.js), hardcoded currency list that should be externalized to config, and potential injection vulnerabilities from unvalidated user input.';

            // Build the consolidated review comment
            const reviewBody = [
              '## 🚨 Security Audit Failed - Critical Vulnerabilities Detected',
              '',
              '**Status**: ❌ **FAILED** - Immediate action required',
              '',
              'This PR contains **9 security vulnerabilities** including 5 CRITICAL and 2 HIGH severity issues that must be addressed before merging.',
              '',
              summary,
              '',
              '<details>',
              '<summary>PR Bot Information</summary>',
              '',
              '**Version:** `1.0.0` | 📖 [Documentation](https://github.com/Balajeeiyer/MockAI/blob/main/.github/HYPERSPACE_BOT.md) | 💬 [Feedback](https://github.com/Balajeeiyer/MockAI/issues)',
              '',
              '- Event Trigger: `pull_request.' + context.payload.action + '`',
              '- LLM: `anthropic--claude-4.6-sonnet`',
              '- Correlation ID: `' + correlationId + '`',
              '- Files Changed: ' + fileCount,
              '- Lines: +' + additions + ' / -' + deletions,
              '- Security Scan: FAILED',
              '- Total Vulnerabilities: 9',
              '- CRITICAL: 5 | HIGH: 2 | MEDIUM: 2',
              '',
              '</details>',
              '',
              '---',
              '',
              '## 🛡️ Security Vulnerabilities Summary',
              '',
              '### Critical Severity (5)',
              '',
              '| Severity | Vulnerability | CVSS | File | Line | Inline Fix |',
              '|----------|--------------|------|------|------|------------|',
              '| 🔴 CRITICAL | Code Injection (eval) | 9.8 | `srv/product-service.js` | 52 | ✅ Posted |',
              '| 🔴 CRITICAL | SQL Injection | 9.1 | `srv/analytics-service.js` | 17-18 | ✅ Posted |',
              '| 🔴 CRITICAL | Command Injection | 9.8 | `srv/analytics-service.js` | 32 | ✅ Posted |',
              '| 🔴 CRITICAL | Information Disclosure (env vars) | 9.1 | `srv/analytics-service.js` | 71 | ✅ Posted |',
              '| 🔴 CRITICAL | Hardcoded Credentials | 9.8 | `srv/config.js` | 10-13 | ✅ Posted |',
              '',
              '### High Severity (2)',
              '',
              '| Severity | Vulnerability | CVSS | File | Line | Inline Fix |',
              '|----------|--------------|------|------|------|------------|',
              '| 🟠 HIGH | Hardcoded API Keys | 8.2 | `srv/config.js` | 18-23 | ✅ Posted |',
              '| 🟠 HIGH | Missing Authentication | 8.2 | `srv/analytics-service.js` | 46 | ✅ Posted |',
              '',
              '### Medium Severity (2)',
              '',
              '| Severity | Vulnerability | CVSS | File | Line | Inline Fix |',
              '|----------|--------------|------|------|------|------------|',
              '| 🟡 MEDIUM | XSS Vulnerability | 7.5 | `srv/product-service.js` | 32 | ✅ Posted |',
              '| 🟡 MEDIUM | Information Disclosure (logs) | 5.3 | `srv/product-service.js` | 120 | ✅ Posted |',
              '',
              '> **💡 How to view inline fixes:**  ',
              '> Go to the **Files changed** tab above. Each vulnerability has an inline comment with a **"Commit suggestion"** button you can click to apply the fix.',
              '',
              '---',
              '',
              '*🚨 Security audit failed. View inline commit suggestions in the **Files changed** tab to fix each vulnerability. Each suggestion can be committed directly with one click!*'
            ].join('\n');

            // Delete old comments from previous runs
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber
            });

            for (const comment of comments) {
              if (comment.body.includes('🚀 Hyperspace Bot Analysis Report') ||
                  comment.body.includes('📊 Code Quality & Security Summary')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: comment.id
                });
              }
            }

            // Post the consolidated review
            await github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: reviewBody
            });

      - name: Request Reviews from Bots
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
              await github.rest.issues.addLabels({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: [
                  'hyperspace-analyzed',
                  'code-quality-review',
                  'security-review',
                  'build-check',
                  'changes-required'
                ]
              });

              console.log('Added review stage labels');
            } catch (error) {
              console.log('Error adding labels:', error.message);
            }

            // Assign PR to author for review
            try {
              const prAuthor = context.payload.pull_request.user.login;

              await github.rest.issues.addAssignees({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                assignees: [prAuthor]
              });

              console.log('Added ' + prAuthor + ' as assignee');
            } catch (error) {
              console.log('Could not add assignee:', error.message);
            }

            // Request review (using PR author as reviewer for demo)
            // In production: replace with actual code reviewer usernames
            try {
              const prAuthor = context.payload.pull_request.user.login;

              // Note: Can't request review from PR author, so this is for demo only
              // In production, use actual reviewer usernames
              console.log('Would request review from code-quality-bot, security-scan-bot, build-analyzer-bot');
            } catch (error) {
              console.log('Could not request review:', error.message);
            }

      - name: Update PR Status
        uses: actions/github-script@v6
        continue-on-error: true
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
              await github.rest.repos.createCommitStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                sha: context.payload.pull_request.head.sha,
                state: 'failure',
                context: 'Hyperspace Bot / Code Analysis',
                description: 'Changes required - see PR comments',
                target_url: 'https://github.com/' + context.repo.owner + '/' + context.repo.repo + '/pull/' + context.issue.number
              });
            } catch (error) {
              console.log('Could not set commit status (permissions):', error.message);
            }

  cross-repo-dispatcher:
    name: Cross-Repository Integration Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for API changes
        id: api-changes
        uses: actions/github-script@v6
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            // Check if any API-related files changed
            const apiFiles = [
              'srv/product-service.cds',
              'srv/product-service.js',
              'db/schema.cds'
            ];

            const hasApiChanges = files.some(file =>
              apiFiles.some(apiFile => file.filename.includes(apiFile))
            );

            core.setOutput('has_api_changes', hasApiChanges);
            return hasApiChanges;

      - name: Read dependent repos configuration
        if: steps.api-changes.outputs.has_api_changes == 'true'
        id: read-config
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');

            // Read dependent-repos.yml and parse manually (simple parser for our use case)
            const configContent = fs.readFileSync('.github/dependent-repos.yml', 'utf8');

            // Extract dependent repos from YAML manually
            const dependentRepos = [];

            // Simple YAML parsing for our specific structure
            const lines = configContent.split('\n');
            let currentRepo = null;

            for (let i = 0; i < lines.length; i++) {
              const line = lines[i].trim();

              if (line.startsWith('- name:')) {
                if (currentRepo) {
                  dependentRepos.push(currentRepo);
                }
                currentRepo = {
                  name: line.replace('- name:', '').trim(),
                  critical: false,
                  estimated_duration: 300
                };
              } else if (currentRepo && line.startsWith('repository:')) {
                currentRepo.repository = line.replace('repository:', '').trim();
              } else if (currentRepo && line.startsWith('critical:')) {
                currentRepo.critical = line.replace('critical:', '').trim() === 'true';
              } else if (currentRepo && line.startsWith('estimated_duration:')) {
                currentRepo.estimated_duration = parseInt(line.replace('estimated_duration:', '').trim());
              }
            }

            if (currentRepo) {
              dependentRepos.push(currentRepo);
            }

            console.log('Found dependent repos:', JSON.stringify(dependentRepos, null, 2));
            return dependentRepos;

      - name: Dispatch integration tests
        if: steps.api-changes.outputs.has_api_changes == 'true'
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const dependentRepos = ${{ steps.read-config.outputs.result }};

            if (!dependentRepos || dependentRepos.length === 0) {
              console.log('No dependent repositories configured');
              return;
            }

            console.log('Dispatching integration tests to ' + dependentRepos.length + ' repositories...');

            for (const repo of dependentRepos) {
              const [owner, repoName] = repo.repository.split('/');

              console.log('Dispatching to: ' + repo.repository);

              try {
                await github.rest.repos.createDispatchEvent({
                  owner: owner,
                  repo: repoName,
                  event_type: 'external-integration-test',
                  client_payload: {
                    source_repo: context.repo.owner + '/' + context.repo.repo,
                    source_pr: context.issue.number,
                    source_branch: context.payload.pull_request.head.ref,
                    source_sha: context.payload.pull_request.head.sha,
                    source_pr_url: context.payload.pull_request.html_url,
                    triggered_by: context.actor
                  }
                });

                console.log('Successfully dispatched to ' + repo.repository);
              } catch (error) {
                console.error('Failed to dispatch to ' + repo.repository + ':', error.message);
              }
            }

      - name: Post cross-repo notification comment
        if: steps.api-changes.outputs.has_api_changes == 'true'
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const dependentRepos = ${{ steps.read-config.outputs.result }};

            if (!dependentRepos || dependentRepos.length === 0) {
              return;
            }

            let comment = '## Cross-Repository Integration Tests Triggered\n\n';
            comment += 'API changes detected. Dispatched integration tests to **' + dependentRepos.length + '** dependent repositories:\n\n';

            for (const repo of dependentRepos) {
              comment += '- **[' + repo.name + '](https://github.com/' + repo.repository + ')** ';
              if (repo.critical) {
                comment += '(CRITICAL) ';
              }
              comment += '- Est. ' + (repo.estimated_duration / 60) + ' min\n';
            }

            comment += '\n### 📬 Notification\n\n';
            comment += `@${context.repo.owner} - API changes detected in this PR. Please review.\n\n`;
            comment += '---\n';
            comment += '*API changes detected • Code owner notified*\n';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });
