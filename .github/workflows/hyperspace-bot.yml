name: 🚀 Hyperspace Bot - AI PR Analysis

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - master

permissions:
  contents: read
  pull-requests: write
  checks: write
  issues: write

jobs:
  security-analysis:
    name: Security Analysis (WhiteSource, Checkmarx, SonarQube)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR Files
        id: pr-files
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            core.setOutput('file_count', files.length);
            core.setOutput('additions', pr.additions);
            core.setOutput('deletions', pr.deletions);
            core.setOutput('head_sha', pr.head.sha);

            return files;

      - name: WhiteSource Scan
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.issue.number;

            // Simulate WhiteSource scan results
            const whitesourceResults = {
              vulnerabilities: 2,
              licenses: 0,
              policy_violations: 0,
              high_severity: 1,
              medium_severity: 1
            };

            console.log('WhiteSource scan completed');
            console.log(JSON.stringify(whitesourceResults, null, 2));

            // Post WhiteSource check result
            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'WhiteSource Security Scan',
              head_sha: '${{ steps.pr-files.outputs.head_sha }}',
              status: 'completed',
              conclusion: whitesourceResults.high_severity > 0 ? 'failure' : 'success',
              output: {
                title: whitesourceResults.high_severity > 0 ? 'Security vulnerabilities detected' : 'No security issues',
                summary: `**Vulnerabilities Found:** ${whitesourceResults.vulnerabilities}\n` +
                         `**High Severity:** ${whitesourceResults.high_severity}\n` +
                         `**Medium Severity:** ${whitesourceResults.medium_severity}\n` +
                         `**License Issues:** ${whitesourceResults.licenses}\n` +
                         `**Policy Violations:** ${whitesourceResults.policy_violations}`
              }
            });

      - name: Checkmarx SAST Scan
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.issue.number;
            const headSha = '${{ steps.pr-files.outputs.head_sha }}';

            // Simulate Checkmarx scan results
            const checkmarxResults = {
              high: 2,
              medium: 3,
              low: 5,
              info: 8,
              total: 18,
              findings: [
                {
                  severity: 'HIGH',
                  type: 'Code Injection',
                  file: 'srv/product-service.js',
                  line: 55,
                  description: 'Use of eval() allows code injection attacks'
                },
                {
                  severity: 'HIGH',
                  type: 'XSS',
                  file: 'srv/product-service.js',
                  line: 34,
                  description: 'Unvalidated user input in description field'
                },
                {
                  severity: 'MEDIUM',
                  type: 'Information Disclosure',
                  file: 'srv/product-service.js',
                  line: 71,
                  description: 'Logging sensitive user data'
                }
              ]
            };

            console.log('Checkmarx SAST scan completed');
            console.log(JSON.stringify(checkmarxResults, null, 2));

            // Post inline comments for high severity findings
            for (const finding of checkmarxResults.findings.filter(f => f.severity === 'HIGH')) {
              try {
                await github.rest.pulls.createReviewComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                  commit_id: headSha,
                  path: finding.file,
                  line: finding.line,
                  side: 'RIGHT',
                  body: '**Checkmarx SAST - ' + finding.severity + '**\n\n' +
                        '**Type:** ' + finding.type + '\n' +
                        '**Description:** ' + finding.description + '\n\n' +
                        '_This issue must be fixed before merging._'
                });
              } catch (error) {
                console.log(`Could not post comment: ${error.message}`);
              }
            }

            // Post Checkmarx check result
            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'Checkmarx SAST',
              head_sha: headSha,
              status: 'completed',
              conclusion: checkmarxResults.high > 0 ? 'failure' : 'success',
              output: {
                title: checkmarxResults.high > 0 ? 'Security issues detected' : 'No critical issues',
                summary: '**Total Findings:** ' + checkmarxResults.total + '\n\n' +
                         '- High: ' + checkmarxResults.high + '\n' +
                         '- Medium: ' + checkmarxResults.medium + '\n' +
                         '- Low: ' + checkmarxResults.low + '\n' +
                         '- Info: ' + checkmarxResults.info + '\n\n' +
                         '**High Severity Findings:**\n' +
                         checkmarxResults.findings
                           .filter(f => f.severity === 'HIGH')
                           .map(f => '- ' + f.type + ' in ' + f.file + ':' + f.line)
                           .join('\n')
              }
            });

      - name: SonarQube Analysis
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.issue.number;
            const headSha = '${{ steps.pr-files.outputs.head_sha }}';

            // Simulate SonarQube scan results
            const sonarResults = {
              quality_gate: 'FAILED',
              bugs: 2,
              vulnerabilities: 3,
              code_smells: 12,
              coverage: 65.4,
              duplications: 2.1,
              security_hotspots: 4,
              maintainability_rating: 'C',
              reliability_rating: 'B',
              security_rating: 'D'
            };

            console.log('SonarQube analysis completed');
            console.log(JSON.stringify(sonarResults, null, 2));

            // Create PR comment with SonarQube results
            const passed = sonarResults.quality_gate === 'PASSED';
            const sonarComment = '## SonarQube Analysis Results\n\n' +
              '**Quality Gate:** ' + (passed ? 'PASSED' : 'FAILED') + '\n\n' +
              '### Issues\n' +
              '| Category | Count |\n' +
              '|----------|-------|\n' +
              '| Bugs | ' + sonarResults.bugs + ' |\n' +
              '| Vulnerabilities | ' + sonarResults.vulnerabilities + ' |\n' +
              '| Code Smells | ' + sonarResults.code_smells + ' |\n' +
              '| Security Hotspots | ' + sonarResults.security_hotspots + ' |\n\n' +
              '### Ratings\n' +
              '- **Maintainability:** ' + sonarResults.maintainability_rating + '\n' +
              '- **Reliability:** ' + sonarResults.reliability_rating + '\n' +
              '- **Security:** ' + sonarResults.security_rating + '\n\n' +
              '### Metrics\n' +
              '- **Code Coverage:** ' + sonarResults.coverage + '%\n' +
              '- **Duplications:** ' + sonarResults.duplications + '%\n\n' +
              '---\n' +
              '_Analysis powered by SonarQube_';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: sonarComment
            });

            // Post SonarQube check result
            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'SonarQube Quality Gate',
              head_sha: headSha,
              status: 'completed',
              conclusion: sonarResults.quality_gate === 'PASSED' ? 'success' : 'failure',
              output: {
                title: sonarResults.quality_gate === 'PASSED' ? 'Quality Gate Passed' : 'Quality Gate Failed',
                summary: '**Bugs:** ' + sonarResults.bugs + ' | ' +
                         '**Vulnerabilities:** ' + sonarResults.vulnerabilities + ' | ' +
                         '**Code Smells:** ' + sonarResults.code_smells + '\n\n' +
                         '**Coverage:** ' + sonarResults.coverage + '% | ' +
                         '**Security Rating:** ' + sonarResults.security_rating
              }
            });

      - name: Post Security Summary
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.issue.number;
            const fileCount = ${{ steps.pr-files.outputs.file_count }};
            const additions = ${{ steps.pr-files.outputs.additions }};
            const deletions = ${{ steps.pr-files.outputs.deletions }};

            const summary = '## Hyperspace Bot - Security Analysis Complete\n\n' +
              '**PR Analysis:**\n' +
              '- **Files Changed:** ' + fileCount + '\n' +
              '- **Lines:** +' + additions + ' / -' + deletions + '\n\n' +
              '**Security Scans Completed:**\n' +
              '- WhiteSource - Dependency vulnerabilities\n' +
              '- Checkmarx SAST - Static code analysis\n' +
              '- SonarQube - Code quality & security\n\n' +
              '**Action Required:**\n' +
              'Please review the security findings above and address any critical issues before merging.\n\n' +
              '---\n' +
              '_Automated security analysis by Hyperspace Bot_';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: summary
            });

  cross-repo-dispatcher:
    name: Dispatch Integration Tests to Dependent Repos
    runs-on: ubuntu-latest
    needs: security-analysis
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check for API changes
        id: check-changes
        run: |
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          API_FILES=$(echo "$CHANGED_FILES" | grep -E '(srv/.*\.cds|srv/.*\.js|db/schema\.cds)' || true)

          if [ -n "$API_FILES" ]; then
            echo "api_changed=true" >> $GITHUB_OUTPUT
            echo "API files changed: $API_FILES"
          else
            echo "api_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Read dependent repos config
        if: steps.check-changes.outputs.api_changed == 'true'
        id: read-config
        run: |
          if [ ! -f ".github/dependent-repos.yml" ]; then
            echo "repos=[]" >> $GITHUB_OUTPUT
            exit 0
          fi

          npm install --no-save js-yaml
          node << 'EOF'
            const yaml = require('js-yaml');
            const fs = require('fs');
            const config = yaml.load(fs.readFileSync('.github/dependent-repos.yml', 'utf8'));
            const repos = config.dependent_repos || [];
            fs.appendFileSync(process.env.GITHUB_OUTPUT, 'repos=' + JSON.stringify(repos) + '\n');
EOF

      - name: Dispatch to dependent repos
        if: steps.check-changes.outputs.api_changed == 'true' && steps.read-config.outputs.repos != '[]'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPOS='${{ steps.read-config.outputs.repos }}'

          echo "$REPOS" | node << 'EOF'
            const repos = JSON.parse(require('fs').readFileSync(0, 'utf-8'));
            const { execSync } = require('child_process');

            repos.forEach(repo => {
              const payload = {
                source_repo: '${{ github.repository }}',
                source_pr: ${{ github.event.pull_request.number }},
                source_branch: '${{ github.head_ref }}',
                source_sha: '${{ github.event.pull_request.head.sha }}',
                pr_url: '${{ github.event.pull_request.html_url }}',
                pr_title: '${{ github.event.pull_request.title }}',
                triggered_by: '${{ github.actor }}',
                dependencies: repo.dependencies,
                critical: repo.critical || false
              };

              console.log(`Dispatching to ${repo.repository}...`);
              console.log('Payload:', JSON.stringify(payload, null, 2));

              try {
                const payloadJson = JSON.stringify(payload);
                const cmd = `gh api repos/${repo.repository}/dispatches -f event_type=external-integration-test -f 'client_payload=${payloadJson}'`;
                console.log('Command:', cmd);
                execSync(cmd, {stdio: 'inherit', env: process.env});
                console.log(`✓ Dispatched to ${repo.repository}`);
              } catch (error) {
                console.error(`✗ Failed to dispatch to ${repo.repository}:`, error.message);
              }
            });
EOF

      - name: Create tracking comment
        if: steps.check-changes.outputs.api_changed == 'true' && steps.read-config.outputs.repos != '[]'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const repos = JSON.parse('${{ steps.read-config.outputs.repos }}');
            const repoList = repos.map(r => '- [' + r.name + '](https://github.com/' + r.repository + ') - Estimated: ' + r.estimated_duration + 's').join('\n');

            const comment = '## Cross-Repository Integration Tests Triggered\n\n' +
              'API changes detected in this PR. Integration tests dispatched to **' + repos.length + '** dependent repository(ies).\n\n' +
              '### Dependent Repositories:\n' + repoList + '\n\n' +
              '**Note:** Test results will be reported back to this PR via GitHub Checks API.\n\n' +
              '---\n*Dispatched by Cross-Repository Integration Testing System*';

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
