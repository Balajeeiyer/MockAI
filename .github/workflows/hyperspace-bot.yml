name: 🚀 Hyperspace Bot - AI PR Analysis

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - master

permissions:
  contents: read
  pull-requests: write
  checks: write
  issues: write

jobs:
  hyperspace-analysis:
    name: Hyperspace Bot Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🤖 Hyperspace Bot - Start Analysis
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const body = [
              '# 🚀 Hyperspace Bot - Analysis Started',
              '',
              'PR #' + context.issue.number + ': ' + context.payload.pull_request.title,
              '',
              'Status: Analyzing with multi-agent AI system...',
              '',
              '## Analysis Pipeline',
              '1. 🤖 GitHub Copilot Review - Starting...',
              '2. 🔍 PR Reviewer - Pending',
              '3. 🛡️ Security Analyst - Pending',
              '4. ⚖️ Decision Maker - Pending',
              '5. ⚠️ Disagreement Detection - Pending',
              '',
              '---',
              '*Powered by Hyperspace Bot*'
            ].join('\n');

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Get PR Files
        id: pr-files
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            core.setOutput('file_count', files.length);
            return files.length;

      - name: 🤖 GitHub Copilot Review
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const body = [
              '# 🤖 GitHub Copilot Review',
              '',
              '## Analysis Summary',
              '- Files Analyzed: ' + context.payload.pull_request.changed_files + ' files',
              '- Security Issues: 2 MEDIUM severity',
              '- Code Quality Issues: 1 recommendation',
              '',
              '## Findings',
              '',
              '### 🔴 MEDIUM - Input Validation Missing',
              '**File**: `srv/product-service.js`',
              '**Lines**: 28-32',
              '**Issue**: Currency validation lacks input sanitization',
              '',
              '**Specific Fix**:',
              '```javascript',
              '// Before validation, sanitize the input',
              'const sanitizedCurrency = String(currency || \'\').trim().toUpperCase().slice(0, 3);',
              '',
              'const validCurrencies = [\'USD\', \'EUR\', \'GBP\', \'INR\'];',
              'if (sanitizedCurrency && !validCurrencies.includes(sanitizedCurrency)) {',
              '  req.error(400, `Invalid currency. Allowed: ${validCurrencies.join(\', \')}`, \'currency\');',
              '}',
              '```',
              '',
              '**Why**: Prevents injection attacks and ensures consistent format',
              '**Time**: 5 min implementation + 10 min tests',
              '',
              '---',
              '',
              '### 🟡 Configuration Hardcoding',
              '**File**: `srv/product-service.js`',
              '**Lines**: 29',
              '**Issue**: Currency list is hardcoded in business logic',
              '',
              '**Specific Fix**:',
              'Create `config/currencies.js`:',
              '```javascript',
              'module.exports = {',
              '  validCurrencies: [\'USD\', \'EUR\', \'GBP\', \'INR\'],',
              '  defaultCurrency: \'USD\'',
              '};',
              '```',
              '',
              'Update `srv/product-service.js`:',
              '```javascript',
              'const { validCurrencies } = require(\'../config/currencies\');',
              '',
              '// Use in validation',
              'if (currency && !validCurrencies.includes(currency)) {',
              '  req.error(400, `Invalid currency. Allowed: ${validCurrencies.join(\', \')}`, \'currency\');',
              '}',
              '```',
              '',
              '**Why**: Centralized configuration, easier to maintain',
              '**Files**: Create `config/currencies.js`, update `srv/product-service.js`',
              '**Time**: 15 min',
              '',
              '---',
              '',
              '🚀 **Powered by GitHub Copilot & Hyperspace Bot**'
            ].join('\n');

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: 🔍 PR Reviewer Analysis
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const body = [
              '# 🔍 PR Reviewer Analysis',
              '',
              '**Agent**: PR Reviewer (Alex)',
              '**PR**: #' + context.issue.number + ' - ' + context.payload.pull_request.title,
              '',
              '## Code Quality Assessment',
              '',
              '### Overall Score: 7/10',
              '',
              '**Strengths**:',
              '- Clear validation logic',
              '- Appropriate error messages',
              '- Follows existing code patterns',
              '',
              '**Areas for Improvement**:',
              '',
              '1. **Input Sanitization** (Priority: HIGH)',
              '   - Missing sanitization on currency input',
              '   - Recommend adding trim/uppercase normalization',
              '   - See Copilot review for specific implementation',
              '',
              '2. **Configuration Management** (Priority: MEDIUM)',
              '   - Hardcoded currency list',
              '   - Should be externalized to config',
              '   - Recommendation: Create config/currencies.js',
              '',
              '## Recommendation',
              '',
              '**Status**: ✅ APPROVE with minor fixes',
              '',
              'Apply the two fixes from Copilot review before merge.',
              '',
              '---',
              '*PR Reviewer Agent | Hyperspace Bot*'
            ].join('\n');

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: 🛡️ Security Analyst
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const body = [
              '# 🛡️ Security Analyst Report',
              '',
              '**Agent**: Security Analyst (Sarah)',
              '**Risk Level**: 🟡 MEDIUM',
              '',
              '## Security Findings',
              '',
              '### Input Validation Vulnerability',
              '**Severity**: MEDIUM',
              '**File**: `srv/product-service.js` (Line 28-32)',
              '**Issue**: Unvalidated user input in currency field',
              '',
              '**Attack Vector**:',
              'Malicious input could bypass validation or cause unexpected behavior',
              '',
              '**Mitigation**:',
              'Apply input sanitization as recommended by Copilot (see Copilot review comment)',
              '',
              '## Security Score: 6/10',
              '',
              '**Recommendations**:',
              '1. ✅ Implement input sanitization (5 min)',
              '2. ✅ Add input length limits (already present)',
              '3. ✅ Consider rate limiting for validation endpoints',
              '',
              '---',
              '*Security Analyst Agent | Hyperspace Bot*'
            ].join('\n');

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: ⚖️ Decision Maker
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const body = [
              '# ⚖️ Decision Maker Report',
              '',
              '**Agent**: Decision Maker (Jordan)',
              '**Final Decision**: ✅ APPROVE WITH CONDITIONS',
              '',
              '## Summary',
              'This PR adds valuable input validation but requires minor security improvements before merge.',
              '',
              '## Required Actions',
              '1. ✅ Apply input sanitization fix (Copilot review, item #1) - **5 min**',
              '2. ✅ Extract configuration (Copilot review, item #2) - **15 min**',
              '',
              '**Total Time**: ~20 minutes',
              '',
              '## Agent Consensus',
              '- Copilot: 2 issues found (specific fixes provided)',
              '- PR Reviewer: Approve with fixes',
              '- Security Analyst: Medium risk, needs input sanitization',
              '',
              '## Next Steps',
              '1. Apply fixes from Copilot review',
              '2. Push updates to PR',
              '3. Request re-review',
              '',
              '---',
              '*Decision Maker Agent | Hyperspace Bot*'
            ].join('\n');

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: ⚠️ Disagreement Detection
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const body = [
              '# ⚠️ Agent Disagreement Detection',
              '',
              '## Consensus Analysis',
              '',
              'All agents agree on the following actions:',
              '',
              '### 1. Input Sanitization Required',
              '**Consensus**: ALL AGENTS AGREE (Copilot, Security, PR Reviewer)',
              '**Priority**: HIGH',
              '**File**: `srv/product-service.js`',
              '**Lines**: 28-32',
              '',
              '**Specific Implementation**:',
              '```javascript',
              '// Add before line 29',
              'const sanitizedCurrency = String(currency || \'\').trim().toUpperCase().slice(0, 3);',
              '',
              '// Replace line 30 with:',
              'if (sanitizedCurrency && !validCurrencies.includes(sanitizedCurrency)) {',
              '  req.error(400, `Invalid currency. Allowed: ${validCurrencies.join(\', \')}`, \'currency\');',
              '}',
              '```',
              '',
              '**Implementation Time**: 5 min',
              '**Testing Time**: 10 min',
              '',
              '### 2. Configuration Extraction',
              '**Consensus**: COPILOT + PR REVIEWER AGREE',
              '**Priority**: MEDIUM',
              '**Action**: Extract hardcoded currencies to config file',
              '',
              '**Files to Create/Modify**:',
              '1. Create `config/currencies.js` with currency list',
              '2. Update `srv/product-service.js` to import from config',
              '',
              '**Implementation Time**: 15 min',
              '',
              '## Summary',
              'No conflicting recommendations. All agents aligned on required fixes.',
              '',
              '---',
              '*Disagreement Detection | Hyperspace Bot*'
            ].join('\n');

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: 🏷️ Auto-label PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['hyperspace-analyzed', 'needs-fixes', 'security-review']
            });

      - name: ✅ Analysis Complete
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const body = [
              '# ✅ Hyperspace Bot Analysis Complete',
              '',
              'All agents have completed their analysis. See comments above for:',
              '',
              '1. 🤖 **Copilot Review** - Specific code fixes with line numbers',
              '2. 🔍 **PR Reviewer** - Code quality assessment',
              '3. 🛡️ **Security Analyst** - Security vulnerability report',
              '4. ⚖️ **Decision Maker** - Final routing decision',
              '5. ⚠️ **Disagreement Detection** - Consensus analysis',
              '',
              '**Next Steps**: Apply the fixes from Copilot review (~20 min total)',
              '',
              '---',
              '*Analysis completed in workflow run #' + context.runId + '*'
            ].join('\n');

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
