name: 🚀 Hyperspace Bot - AI PR Analysis

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - master

permissions:
  contents: read
  pull-requests: write
  checks: write
  issues: write

jobs:
  hyperspace-analysis:
    name: Hyperspace Bot Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR Files
        id: pr-files
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            core.setOutput('file_count', files.length);
            core.setOutput('additions', pr.additions);
            core.setOutput('deletions', pr.deletions);
            core.setOutput('changed_files', pr.changed_files);
            core.setOutput('head_sha', pr.head.sha);

            return files;

      - name: Post Inline Code Suggestions
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.issue.number;
            const headSha = '${{ steps.pr-files.outputs.head_sha }}';

            // Define suggestions for specific lines
            const suggestions = [
              {
                path: 'srv/product-service.js',
                line: 30,
                side: 'RIGHT',
                body: [
                  '**Bug**: Missing input sanitization on currency field',
                  '',
                  'Currency validation lacks trim/uppercase normalization. User input could contain leading/trailing whitespace or mixed case, bypassing validation or causing inconsistent behavior.',
                  '',
                  'Consider sanitizing the input before validation:',
                  '````suggestion',
                  '    // Validate currency - sanitize input first',
                  '    const sanitizedCurrency = String(currency || \'\').trim().toUpperCase().slice(0, 3);',
                  '    const validCurrencies = [\'USD\', \'EUR\', \'GBP\', \'INR\'];',
                  '    if (sanitizedCurrency && !validCurrencies.includes(sanitizedCurrency)) {',
                  '      req.error(400, `Invalid currency. Allowed: ${validCurrencies.join(\', \')}`, \'currency\');',
                  '    }',
                  '````',
                  '_Double-check suggestion before committing. Edit this comment for amendments._',
                  '<!-- PR-Bot Feedback-Section-Start -->',
                  '---',
                  '_Please provide feedback on the review comment by checking the appropriate box:_',
                  '',
                  '- [ ] <!-- PR-Bot Feedback Awesome --> 🌟 Awesome comment, a human might have missed that.',
                  '- [ ] <!-- PR-Bot Feedback Helpful --> ✅ Helpful comment',
                  '- [ ] <!-- PR-Bot Feedback Neutral --> 🤷 Neutral',
                  '- [ ] <!-- PR-Bot Feedback Not helpful --> ❌ This comment is not helpful<!-- PR-Bot Feedback-Section-End -->'
                ].join('\n')
              },
              {
                path: 'srv/product-service.js',
                line: 29,
                side: 'RIGHT',
                body: [
                  '**Best Practices**: Hardcoded configuration should be externalized',
                  '',
                  'The currency list is hardcoded directly in business logic. This makes it difficult to add new currencies without code changes and reduces maintainability.',
                  '',
                  'Consider extracting to a configuration file. First, create `config/currencies.js`:',
                  '````suggestion',
                  'const { validCurrencies } = require(\'../config/currencies\');',
                  '````',
                  '',
                  'Then create `config/currencies.js`:',
                  '```javascript',
                  'module.exports = {',
                  '  validCurrencies: [\'USD\', \'EUR\', \'GBP\', \'INR\'],',
                  '  defaultCurrency: \'USD\'',
                  '};',
                  '```',
                  '_Double-check suggestion before committing. Edit this comment for amendments._',
                  '<!-- PR-Bot Feedback-Section-Start -->',
                  '---',
                  '_Please provide feedback on the review comment by checking the appropriate box:_',
                  '',
                  '- [ ] <!-- PR-Bot Feedback Awesome --> 🌟 Awesome comment, a human might have missed that.',
                  '- [ ] <!-- PR-Bot Feedback Helpful --> ✅ Helpful comment',
                  '- [ ] <!-- PR-Bot Feedback Neutral --> 🤷 Neutral',
                  '- [ ] <!-- PR-Bot Feedback Not helpful --> ❌ This comment is not helpful<!-- PR-Bot Feedback-Section-End -->'
                ].join('\n')
              }
            ];

            // Post each suggestion as a review comment
            for (const suggestion of suggestions) {
              try {
                await github.rest.pulls.createReviewComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                  commit_id: headSha,
                  path: suggestion.path,
                  line: suggestion.line,
                  side: suggestion.side,
                  body: suggestion.body
                });
                console.log(`Posted suggestion for ${suggestion.path}:${suggestion.line}`);
              } catch (error) {
                console.log(`Failed to post suggestion for ${suggestion.path}:${suggestion.line}`, error.message);
              }
            }

      - name: Analyze Code and Post Review
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.issue.number;
            const prTitle = context.payload.pull_request.title;
            const fileCount = ${{ steps.pr-files.outputs.file_count }};
            const additions = ${{ steps.pr-files.outputs.additions }};
            const deletions = ${{ steps.pr-files.outputs.deletions }};

            // Generate correlation ID
            const correlationId = require('crypto').randomUUID();

            // Analysis summary
            const summary = 'This PR adds currency validation logic with hardcoded configuration. It contains input sanitization issues that should be resolved before merging: missing trim/uppercase normalization on currency input (line 28-32 in srv/product-service.js), hardcoded currency list that should be externalized to config, and potential injection vulnerabilities from unvalidated user input.';

            // Build the consolidated review comment
            const reviewBody = [
              summary,
              '',
              '<details>',
              '<summary>PR Bot Information</summary>',
              '',
              '**Version:** `1.0.0` | 📖 [Documentation](https://github.com/Balajeeiyer/MockAI/blob/main/.github/HYPERSPACE_BOT.md) | 💬 [Feedback](https://github.com/Balajeeiyer/MockAI/issues)',
              '',
              '- Event Trigger: `pull_request.' + context.payload.action + '`',
              '- LLM: `anthropic--claude-4.6-sonnet`',
              '- Correlation ID: `' + correlationId + '`',
              '- Files Changed: ' + fileCount,
              '- Lines: +' + additions + ' / -' + deletions,
              '',
              '</details>',
              '',
              '---',
              '',
              '## 🔍 Code Quality Review',
              '',
              '**Reviewer:** @code-quality-bot',
              '',
              '### Issues Found',
              '',
              '#### 🔴 HIGH - Input Validation Missing',
              '**File:** `srv/product-service.js` (Lines 28-32)',
              '',
              '**Issue:** Currency validation lacks input sanitization',
              '',
              '**See inline code suggestion on line 30 for specific fix.**',
              '',
              '**Why:** Prevents injection attacks and ensures consistent format',
              '',
              '**Implementation Time:** 5 min + 10 min tests',
              '',
              '---',
              '',
              '#### 🟡 MEDIUM - Configuration Hardcoding',
              '**File:** `srv/product-service.js` (Line 29)',
              '',
              '**Issue:** Currency list is hardcoded in business logic',
              '',
              '**See inline code suggestion on line 29 for specific fix.**',
              '',
              '**Why:** Centralized configuration, easier to maintain and extend',
              '',
              '**Files to Modify:** Create `config/currencies.js`, update `srv/product-service.js`',
              '',
              '**Implementation Time:** 15 min',
              '',
              '---',
              '',
              '## 🛡️ Security Analysis',
              '',
              '**Reviewer:** @security-scan-bot',
              '',
              '### Security Findings',
              '',
              '#### ⚠️ MEDIUM Severity - Unvalidated Input',
              '',
              '**Location:** `srv/product-service.js:28-32`',
              '',
              '**Vulnerability:** User input in currency field is not sanitized before validation',
              '',
              '**Attack Vector:** Malicious input could bypass validation or cause unexpected behavior',
              '',
              '**Mitigation:** Apply input sanitization as shown in inline code suggestion',
              '',
              '**CVSS Score:** 5.3 (Medium)',
              '',
              '---',
              '',
              '## 📊 Build & Test Predictions',
              '',
              '**Reviewer:** @build-analyzer-bot',
              '',
              '### Predicted Build Results',
              '',
              '#### Maven Build',
              '- **Status:** ✅ PASS (predicted)',
              '- **Reason:** No build configuration changes detected',
              '',
              '#### Unit Tests',
              '- **Status:** ⚠️ POTENTIAL ISSUES',
              '- **Reason:** Currency validation changes may affect existing tests',
              '- **Recommendation:** Add tests for input sanitization',
              '',
              '#### Integration Tests',
              '- **Status:** ✅ PASS (predicted)',
              '- **Reason:** No API contract changes',
              '',
              '---',
              '',
              '## ⚖️ Final Recommendation',
              '',
              '**Decision:** ❌ CHANGES REQUIRED',
              '',
              '### Required Actions (Priority Order)',
              '',
              '1. ✅ **Apply input sanitization** (HIGH) - 5 min',
              '   - File: `srv/product-service.js`',
              '   - **Apply inline code suggestion on line 30**',
              '',
              '2. ✅ **Extract configuration** (MEDIUM) - 15 min',
              '   - Create `config/currencies.js`',
              '   - **Apply inline code suggestion on line 29**',
              '',
              '3. ✅ **Add tests for sanitization** (HIGH) - 10 min',
              '   - Test edge cases: null, undefined, lowercase, special chars',
              '',
              '**Total Estimated Time:** ~30 minutes',
              '',
              '### Assigned Reviewers',
              '',
              '- **Code Quality:** @code-quality-bot',
              '- **Security:** @security-scan-bot',
              '- **Build/Test:** @build-analyzer-bot',
              '',
              '---',
              '',
              '*Analysis complete. Check the **Files changed** tab for inline code suggestions you can commit directly.*'
            ].join('\n');

            // Post the consolidated review
            await github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: reviewBody
            });

      - name: Request Reviews from Bots
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
              await github.rest.issues.addLabels({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: [
                  'hyperspace-analyzed',
                  'code-quality-review',
                  'security-review',
                  'build-check',
                  'changes-required'
                ]
              });

              console.log('Added review stage labels');
            } catch (error) {
              console.log('Error adding labels:', error.message);
            }

            // Assign PR to author for review
            try {
              const prAuthor = context.payload.pull_request.user.login;

              await github.rest.issues.addAssignees({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                assignees: [prAuthor]
              });

              console.log('Added ' + prAuthor + ' as assignee');
            } catch (error) {
              console.log('Could not add assignee:', error.message);
            }

            // Request review (using PR author as reviewer for demo)
            // In production: replace with actual code reviewer usernames
            try {
              const prAuthor = context.payload.pull_request.user.login;

              // Note: Can't request review from PR author, so this is for demo only
              // In production, use actual reviewer usernames
              console.log('Would request review from code-quality-bot, security-scan-bot, build-analyzer-bot');
            } catch (error) {
              console.log('Could not request review:', error.message);
            }

      - name: Update PR Status
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
              await github.rest.repos.createCommitStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                sha: context.payload.pull_request.head.sha,
                state: 'failure',
                context: 'Hyperspace Bot / Code Analysis',
                description: 'Changes required - see PR comments',
                target_url: 'https://github.com/' + context.repo.owner + '/' + context.repo.repo + '/pull/' + context.issue.number
              });
            } catch (error) {
              console.log('Could not set commit status (permissions):', error.message);
            }
