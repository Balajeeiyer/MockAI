name: 🚀 Hyperspace Bot - AI PR Analysis

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - master

permissions:
  contents: read
  pull-requests: write
  checks: write
  issues: write

jobs:
  hyperspace-analysis:
    name: Hyperspace Bot Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR Files
        id: pr-files
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            core.setOutput('file_count', files.length);
            core.setOutput('additions', pr.additions);
            core.setOutput('deletions', pr.deletions);
            core.setOutput('changed_files', pr.changed_files);
            core.setOutput('head_sha', pr.head.sha);

            return files;

      - name: Analyze Code and Post Review
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.issue.number;
            const prTitle = context.payload.pull_request.title;
            const fileCount = ${{ steps.pr-files.outputs.file_count }};
            const additions = ${{ steps.pr-files.outputs.additions }};
            const deletions = ${{ steps.pr-files.outputs.deletions }};

            // Generate correlation ID
            const correlationId = require('crypto').randomUUID();

            // Analysis summary
            const summary = `This PR modifies ${fileCount} file(s) with ${additions} additions and ${deletions} deletions. Please review the changes carefully.`;

            // Build the consolidated review comment
            const reviewBody = [
              '## 🚀 Hyperspace Bot - Automated PR Analysis',
              '',
              '**Status**: ✅ **Analysis Complete**',
              '',
              summary,
              '',
              '<details>',
              '<summary>PR Bot Information</summary>',
              '',
              '**Version:** `1.0.0` | 📖 [Documentation](https://github.com/Balajeeiyer/MockAI/blob/main/.github/HYPERSPACE_BOT.md) | 💬 [Feedback](https://github.com/Balajeeiyer/MockAI/issues)',
              '',
              '- Event Trigger: `pull_request.' + context.payload.action + '`',
              '- LLM: `anthropic--claude-4.6-sonnet`',
              '- Correlation ID: `' + correlationId + '`',
              '- Files Changed: ' + fileCount,
              '- Lines: +' + additions + ' / -' + deletions,
              '',
              '</details>',
              '',
              '---',
              '',
              '## 📊 Analysis Summary',
              '',
              `**PR Title:** ${prTitle}`,
              '',
              `**Files Modified:** ${fileCount}`,
              '',
              '---',
              '',
              '## ⚖️ Recommendation',
              '',
              '**Decision:** ✅ **READY FOR REVIEW**',
              '',
              '### Next Steps',
              '',
              '1. Review the code changes in the **Files changed** tab',
              '2. Ensure all tests pass: `npm test`',
              '3. Check code style compliance: `npm run lint`',
              '4. Verify the changes work as expected',
              '',
              '---',
              '',
              '## 📋 PR Checklist',
              '',
              '- [ ] Code changes reviewed',
              '- [ ] Tests are passing',
              '- [ ] Code follows project style guidelines',
              '- [ ] Documentation updated if needed',
              '- [ ] Ready for merge',
              '',
              '---',
              '',
              '*✅ Automated analysis complete. The PR is ready for human review.*'
            ].join('\n');

            // Post the consolidated review
            await github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: reviewBody
            });

      - name: Add Labels
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
              await github.rest.issues.addLabels({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: [
                  'hyperspace-analyzed',
                  'ready-for-review'
                ]
              });

              console.log('Added review labels');
            } catch (error) {
              console.log('Error adding labels:', error.message);
            }

  cross-repo-dispatcher:
    name: Cross-Repository Integration Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for API changes
        id: api-changes
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            // Check if any API-related files changed
            const apiFiles = [
              'srv/product-service.cds',
              'srv/product-service.js',
              'db/schema.cds'
            ];

            const hasApiChanges = files.some(file =>
              apiFiles.some(apiFile => file.filename.includes(apiFile))
            );

            console.log('API changes detected:', hasApiChanges);
            core.setOutput('has_changes', hasApiChanges.toString());

            return hasApiChanges;

      - name: Load dependent repositories config
        if: steps.api-changes.outputs.has_changes == 'true'
        id: load-config
        run: |
          if [ -f .github/dependent-repos.yml ]; then
            echo "config_exists=true" >> $GITHUB_OUTPUT
          else
            echo "config_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Dispatch integration tests
        if: steps.api-changes.outputs.has_changes == 'true' && steps.load-config.outputs.config_exists == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.CROSS_REPO_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const yaml = require('js-yaml');

            // Check if we have a token with cross-repo permissions
            const hasCrossRepoToken = '${{ secrets.CROSS_REPO_TOKEN }}' !== '';

            if (!hasCrossRepoToken) {
              console.log('⚠️ WARNING: CROSS_REPO_TOKEN not configured. Using GITHUB_TOKEN (limited permissions).');
              console.log('To enable cross-repo testing:');
              console.log('1. Create a Personal Access Token with repo scope');
              console.log('2. Add it as CROSS_REPO_TOKEN secret in repository settings');
            }

            // Load configuration
            const configFile = fs.readFileSync('.github/dependent-repos.yml', 'utf8');
            const config = yaml.load(configFile);

            console.log('Loaded configuration:', JSON.stringify(config, null, 2));

            for (const repo of config.dependent_repos) {
              const [owner, repoName] = repo.repository.split('/');

              console.log(`Dispatching to ${owner}/${repoName}...`);

              try {
                await github.rest.repos.createDispatchEvent({
                  owner,
                  repo: repoName,
                  event_type: 'external-integration-test',
                  client_payload: {
                    source_repo: context.repo.owner + '/' + context.repo.repo,
                    pr_number: context.issue.number,
                    pr_title: context.payload.pull_request.title,
                    pr_url: context.payload.pull_request.html_url,
                    commit_sha: context.payload.pull_request.head.sha,
                    branch: context.payload.pull_request.head.ref
                  }
                });
                console.log(`✅ Successfully dispatched to ${repo.repository}`);
              } catch (error) {
                console.error(`❌ Failed to dispatch to ${repo.repository}:`, error.message);
                if (error.status === 404) {
                  console.error('   Repository not found or no access.');
                  console.error('   Add CROSS_REPO_TOKEN secret with repo scope to enable cross-repo testing.');
                }
              }
            }

      - name: Post cross-repo notification comment
        if: steps.api-changes.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const hasCrossRepoToken = '${{ secrets.CROSS_REPO_TOKEN }}' !== '';

            let comment = '## 🔗 Cross-Repository Integration Tests\n\n';
            comment += 'API changes detected in this PR. Integration tests need to be triggered in dependent repositories.\n\n';

            comment += '### 📬 Repository Owner Notification\n\n';
            comment += '**@Balajeeiyer** - API changes detected that may affect dependent repositories:\n\n';

            if (!hasCrossRepoToken) {
              comment += '**Action Required:**\n';
              comment += '1. Review API changes in this PR\n';
              comment += '2. Manually run integration tests in OrderService repository\n';
              comment += '3. Verify compatibility with existing integrations\n\n';
              comment += '**Manual Testing:**\n';
              comment += '```bash\n';
              comment += 'cd OrderService\n';
              comment += 'npm test\n';
              comment += '```\n\n';
              comment += '**Optional - Enable Automatic Testing:**\n\n';
              comment += 'To enable automatic cross-repository testing:\n';
              comment += '1. Create a Personal Access Token (classic) with `repo` scope\n';
              comment += '2. Add to repository secrets:\n';
              comment += '   - Name: `CROSS_REPO_TOKEN`\n';
              comment += '   - Value: Your PAT\n';
            } else {
              comment += '- Integration test dispatch sent ✅\n';
              comment += '- Waiting for results from OrderService...\n\n';
              comment += 'Results will be posted back to this PR when tests complete.\n';
            }

            comment += '\n---\n';
            comment += '*Automated cross-repository testing • [View configuration](.github/dependent-repos.yml)*\n';

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
