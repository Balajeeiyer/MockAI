name: 🚀 Hyperspace Bot - AI PR Analysis

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - master

permissions:
  contents: read
  pull-requests: write
  checks: write
  issues: write

jobs:
  hyperspace-analysis:
    name: Hyperspace Bot Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR Files
        id: pr-files
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            core.setOutput('file_count', files.length);
            core.setOutput('additions', pr.additions);
            core.setOutput('deletions', pr.deletions);
            core.setOutput('changed_files', pr.changed_files);
            core.setOutput('head_sha', pr.head.sha);

            return files;

      - name: Post Inline Code Suggestions
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.issue.number;
            const headSha = '${{ steps.pr-files.outputs.head_sha }}';

            // Define suggestions for specific lines
            const suggestions = [
              {
                path: 'srv/product-service.js',
                line: 30,
                side: 'RIGHT',
                body: [
                  '**🔴 CRITICAL SECURITY**: XSS Vulnerability - No input sanitization on description field',
                  '',
                  '**Severity**: HIGH | **CVSS**: 7.5',
                  '',
                  'The description field accepts user input without sanitization, allowing potential XSS attacks or injection of malicious content.',
                  '',
                  '**Fix**: Sanitize input before processing:',
                  '````suggestion',
                  '    // SECURITY FIX: Sanitize description input to prevent XSS',
                  '    if (description) {',
                  '      // Remove HTML tags and dangerous characters',
                  '      const sanitizedDescription = String(description)',
                  '        .trim()',
                  '        .replace(/[<>]/g, \'\')',
                  '        .substring(0, 500);',
                  '      req.data.description = sanitizedDescription;',
                  '    }',
                  '````',
                  '',
                  '**Implementation Time**: 5 minutes',
                  '',
                  '_Commit this suggestion directly to fix the security vulnerability._',
                  '<!-- PR-Bot Feedback-Section-Start -->',
                  '---',
                  '_Please provide feedback on the review comment by checking the appropriate box:_',
                  '',
                  '- [ ] <!-- PR-Bot Feedback Awesome --> 🌟 Awesome comment, a human might have missed that.',
                  '- [ ] <!-- PR-Bot Feedback Helpful --> ✅ Helpful comment',
                  '- [ ] <!-- PR-Bot Feedback Neutral --> 🤷 Neutral',
                  '- [ ] <!-- PR-Bot Feedback Not helpful --> ❌ This comment is not helpful<!-- PR-Bot Feedback-Section-End -->'
