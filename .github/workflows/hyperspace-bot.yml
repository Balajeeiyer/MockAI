name: 🚀 Hyperspace Bot - AI PR Analysis

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - master

permissions:
  contents: read
  pull-requests: write
  checks: write
  issues: write

jobs:
  hyperspace-analysis:
    name: Hyperspace Bot Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR Files
        id: pr-files
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            core.setOutput('file_count', files.length);
            core.setOutput('additions', pr.additions);
            core.setOutput('deletions', pr.deletions);
            core.setOutput('changed_files', pr.changed_files);
            core.setOutput('head_sha', pr.head.sha);

            return files;

      - name: Post Inline Code Suggestions
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.issue.number;
            const headSha = '${{ steps.pr-files.outputs.head_sha }}';

            // Define suggestions for specific lines
            const suggestions = [
              {
                path: 'srv/product-service.js',
                line: 32,
                side: 'RIGHT',
                body: [
                  '**🔴 CRITICAL SECURITY**: XSS Vulnerability - No input sanitization on description field',
                  '',
                  '**Severity**: HIGH | **CVSS**: 7.5',
                  '',
                  'The description field accepts user input without sanitization, allowing potential XSS attacks or injection of malicious content.',
                  '',
                  '**Fix**: Sanitize input before processing:',
                  '````suggestion',
                  '    // TODO: Add proper input sanitization to prevent XSS vulnerabilities',
                  '    if (description) {',
                  '      // SECURITY FIX: Sanitize description input to prevent XSS',
                  '      const sanitizedDescription = String(description)',
                  '        .trim()',
                  '        .replace(/[<>]/g, \'\')',
                  '        .substring(0, 500);',
                  '      req.data.description = sanitizedDescription;',
                  '    }',
                  '````',
                  '',
                  '**Implementation Time**: 5 minutes',
                  '',
                  '_Commit this suggestion directly to fix the security vulnerability._',
                  '<!-- PR-Bot Feedback-Section-Start -->',
                  '---',
                  '_Please provide feedback on the review comment by checking the appropriate box:_',
                  '',
                  '- [ ] <!-- PR-Bot Feedback Awesome --> 🌟 Awesome comment, a human might have missed that.',
                  '- [ ] <!-- PR-Bot Feedback Helpful --> ✅ Helpful comment',
                  '- [ ] <!-- PR-Bot Feedback Neutral --> 🤷 Neutral',
                  '- [ ] <!-- PR-Bot Feedback Not helpful --> ❌ This comment is not helpful<!-- PR-Bot Feedback-Section-End -->'
                ].join('\n')
              },
              {
                path: 'srv/product-service.js',
                line: 52,
                side: 'RIGHT',
                body: [
                  '**🔴 CRITICAL SECURITY**: Code Injection via eval() - Remote Code Execution Risk',
                  '',
                  '**Severity**: CRITICAL | **CVSS**: 9.8 | **CWE-94**',
                  '',
                  'Using `eval()` on user input is extremely dangerous and allows arbitrary code execution. An attacker could inject malicious code through the product name field.',
                  '',
                  '**Attack Example**: `"; require(\'child_process\').exec(\'rm -rf /\'); "`',
                  '',
                  '**Fix**: Remove eval() and use proper string validation:',
                  '````suggestion',
                  '    // TODO: Remove eval() and use proper string validation',
                  '    if (name) {',
                  '      // SECURITY FIX: Removed eval() - validate name without code execution',
                  '      const processedName = String(name)',
                  '        .trim()',
                  '        .replace(/[<>\"\'`]/g, \'\')',
                  '        .substring(0, 100);',
                  '      ',
                  '      if (processedName.length === 0) {',
                  '        req.error(400, \'Product name cannot be empty\');',
                  '      }',
                  '      req.data.name = processedName;',
                  '    }',
                  '````',
                  '',
                  '**Implementation Time**: 3 minutes',
                  '**Priority**: IMMEDIATE - This is a critical vulnerability',
                  '',
                  '_Commit this suggestion immediately to prevent code injection attacks._',
                  '<!-- PR-Bot Feedback-Section-Start -->',
                  '---',
                  '_Please provide feedback on the review comment by checking the appropriate box:_',
                  '',
                  '- [ ] <!-- PR-Bot Feedback Awesome --> 🌟 Awesome comment, a human might have missed that.',
                  '- [ ] <!-- PR-Bot Feedback Helpful --> ✅ Helpful comment',
                  '- [ ] <!-- PR-Bot Feedback Neutral --> 🤷 Neutral',
                  '- [ ] <!-- PR-Bot Feedback Not helpful --> ❌ This comment is not helpful<!-- PR-Bot Feedback-Section-End -->'
                ].join('\n')
              },
              {
                path: 'srv/product-service.js',
                line: 120,
                side: 'RIGHT',
                body: [
                  '**🟡 MEDIUM SECURITY**: Information Disclosure - Logging sensitive user data',
                  '',
                  '**Severity**: MEDIUM | **CVSS**: 5.3',
                  '',
                  'Logging user context and sensitive information can lead to data leaks if logs are compromised or accessed by unauthorized parties.',
                  '',
                  '**Fix**: Remove sensitive data from logs:',
                  '````suggestion',
                  '    // SECURITY FIX: Log without exposing sensitive user information',
                  '    console.log(`Stock updated for product ${product.name}: ${product.stock} -> ${newStock}`);',
                  '````',
                  '',
                  '**Implementation Time**: 2 minutes',
                  '',
                  '_Commit this suggestion to prevent information disclosure._',
                  '<!-- PR-Bot Feedback-Section-Start -->',
                  '---',
                  '_Please provide feedback on the review comment by checking the appropriate box:_',
                  '',
                  '- [ ] <!-- PR-Bot Feedback Awesome --> 🌟 Awesome comment, a human might have missed that.',
                  '- [ ] <!-- PR-Bot Feedback Helpful --> ✅ Helpful comment',
                  '- [ ] <!-- PR-Bot Feedback Neutral --> 🤷 Neutral',
                  '- [ ] <!-- PR-Bot Feedback Not helpful --> ❌ This comment is not helpful<!-- PR-Bot Feedback-Section-End -->'
                ].join('\n')
              },
              {
                path: 'srv/product-service.js',
                line: 303,
                side: 'RIGHT',
                body: [
                  '**🔴 CRITICAL SECURITY**: SQL Injection Vulnerability in Advanced Search',
                  '',
                  '**Severity**: CRITICAL | **CVSS**: 9.1 | **CWE-89**',
                  '',
                  'Direct string concatenation in SQL WHERE clause allows SQL injection attacks. An attacker could manipulate the `searchTerm` parameter to access, modify, or delete data.',
                  '',
                  '**Attack Example**: `searchTerm = "\' OR 1=1; DROP TABLE Products; --"`',
                  '',
                  '**Current Vulnerable Code**:',
                  '```javascript',
                  'query = query.where(`name like \'%${searchTerm}%\' or description like \'%${searchTerm}%\'`);',
                  '```',
                  '',
                  '**Fix**: Use CDS parameterized query methods:',
                  '````suggestion',
                  '    // SECURITY FIX: Use parameterized query to prevent SQL injection',
                  '    if (searchTerm) {',
                  '      const sanitizedTerm = String(searchTerm).replace(/[\'";]/g, \'\');',
                  '      query = query.where(',
                  '        `name like \'%\' || ? || \'%\' or description like \'%\' || ? || \'%\'`,',
                  '        sanitizedTerm, sanitizedTerm',
                  '      );',
                  '    }',
                  '````',
                  '',
                  '**Better Approach** - Use CDS expression builder:',
                  '```javascript',
                  'if (searchTerm) {',
                  '  query = query.where(',
                  '    { name: { like: `%${searchTerm}%` } },',
                  '    \'or\',',
                  '    { description: { like: `%${searchTerm}%` } }',
