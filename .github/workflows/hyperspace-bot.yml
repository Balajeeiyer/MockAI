      - name: Request Reviews from Bots
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
              await github.rest.issues.addLabels({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: [
                  'hyperspace-analyzed',
                  'code-quality-review',
                  'security-review',
                  'build-check',
                  'changes-required'
                ]
              });

              console.log('Added review stage labels');
            } catch (error) {
              console.log('Error adding labels:', error.message);
            }

            // Assign PR to author for review
            try {
              const prAuthor = context.payload.pull_request.user.login;

              await github.rest.issues.addAssignees({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                assignees: [prAuthor]
              });

              console.log('Added ' + prAuthor + ' as assignee');
            } catch (error) {
              console.log('Could not add assignee:', error.message);
            }

            // Request review (using PR author as reviewer for demo)
            // In production: replace with actual code reviewer usernames
            try {
              const prAuthor = context.payload.pull_request.user.login;

              // Note: Can't request review from PR author, so this is for demo only
              // In production, use actual reviewer usernames
              console.log('Would request review from code-quality-bot, security-scan-bot, build-analyzer-bot');
            } catch (error) {
              console.log('Could not request review:', error.message);
            }

      - name: Update PR Status
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
              await github.rest.repos.createCommitStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                sha: context.payload.pull_request.head.sha,
                state: 'failure',
                context: 'Hyperspace Bot / Code Analysis',
                description: 'Changes required - see PR comments',
                target_url: 'https://github.com/' + context.repo.owner + '/' + context.repo.repo + '/pull/' + context.issue.number
              });
            } catch (error) {
              console.log('Could not set commit status (permissions):', error.message);
            }

  cross-repo-dispatcher:
    name: Dispatch Integration Tests to Dependent Repos
    runs-on: ubuntu-latest
    needs: hyperspace-analysis  # Run after bot completes
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install js-yaml

      - name: Check for API changes
        id: check-changes
        run: |
          # Check if PR modifies API-related files
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)

          API_FILES=$(echo "$CHANGED_FILES" | grep -E '(srv/.*\.cds|srv/.*\.js|db/schema\.cds)' || true)

          if [ -n "$API_FILES" ]; then
            echo "api_changed=true" >> $GITHUB_OUTPUT
            echo "API files changed:"
            echo "$API_FILES"
          else
            echo "api_changed=false" >> $GITHUB_OUTPUT
            echo "No API files changed"
          fi

      - name: Read dependent repos config
        if: steps.check-changes.outputs.api_changed == 'true'
        id: read-config
        run: |
          node -e "
            const yaml = require('js-yaml');
            const fs = require('fs');

            if (!fs.existsSync('.github/dependent-repos.yml')) {
              console.log('No dependent-repos.yml found, skipping');
              process.exit(0);
            }

            const config = yaml.load(fs.readFileSync('.github/dependent-repos.yml', 'utf8'));
            const repos = config.dependent_repos || [];

            console.log('repos=' + JSON.stringify(repos));
            fs.writeFileSync(process.env.GITHUB_OUTPUT, 'repos=' + JSON.stringify(repos) + '\n', {flag: 'a'});
          "

      - name: Dispatch to dependent repos
        if: steps.check-changes.outputs.api_changed == 'true' && steps.read-config.outputs.repos != '[]'
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
        run: |
          REPOS='${{ steps.read-config.outputs.repos }}'

          echo "$REPOS" | node -e "
            const repos = JSON.parse(require('fs').readFileSync(0, 'utf-8'));

            repos.forEach(repo => {
              const payload = {
                event_type: 'external-integration-test',
                client_payload: {
                  source_repo: '${{ github.repository }}',
                  source_pr: ${{ github.event.pull_request.number }},
                  source_branch: '${{ github.head_ref }}',
                  source_sha: '${{ github.event.pull_request.head.sha }}',
                  pr_url: '${{ github.event.pull_request.html_url }}',
                  pr_title: \`${{ github.event.pull_request.title }}\`,
                  triggered_by: '${{ github.actor }}',
                  dependencies: repo.dependencies,
                  critical: repo.critical || false
                }
              };

              console.log(\`Dispatching to \${repo.repository}...\`);
              console.log('Payload:', JSON.stringify(payload, null, 2));

              // Use GitHub CLI to dispatch
              require('child_process').execSync(
                \`gh api repos/\${repo.repository}/dispatches -f event_type=external-integration-test -F 'client_payload=\${JSON.stringify(payload.client_payload)}'\`,
                {stdio: 'inherit', env: process.env}
              );
            });
          "

      - name: Create tracking comment
        if: steps.check-changes.outputs.api_changed == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const repos = JSON.parse('${{ steps.read-config.outputs.repos }}');
            const repoList = repos.map(r => `- [${r.name}](${r.repository}) - Estimated: ${r.estimated_duration}`).join('\n');

            const comment = `## 🔄 Cross-Repository Integration Tests Triggered

            API changes detected in this PR. Integration tests dispatched to **${repos.length}** dependent repository(ies).

            ### Dependent Repositories:
            ${repoList}

            **Note:** Test results will be reported back to this PR via GitHub Checks API.

            ---
            *Dispatched by Cross-Repository Integration Testing System*`;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
