                  '- [ ] <!-- PR-Bot Feedback Neutral --> 🤷 Neutral',
                  '- [ ] <!-- PR-Bot Feedback Not helpful --> ❌ This comment is not helpful<!-- PR-Bot Feedback-Section-End -->'
                ].join('\n')
