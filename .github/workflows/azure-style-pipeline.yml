name: 🔍 Azure-Style Build & Security Analysis

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  # ===================================================================
  # BUILD VALIDATION
  # ===================================================================
  build:
    name: Build & Dependency Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'

      - name: Install Dependencies
        run: |
          echo "::group::Installing dependencies"
          npm ci
          echo "::endgroup::"

      - name: Security Audit
        id: audit
        continue-on-error: true
        run: |
          echo "::group::npm audit"
          npm audit --audit-level=moderate --json > audit-report.json || true

          CRITICAL=$(cat audit-report.json | jq '.metadata.vulnerabilities.critical // 0')
          HIGH=$(cat audit-report.json | jq '.metadata.vulnerabilities.high // 0')

          echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
          echo "high=$HIGH" >> $GITHUB_OUTPUT

          echo "::notice::Vulnerabilities - Critical: $CRITICAL, High: $HIGH"

          if [ "$CRITICAL" -gt "0" ]; then
            echo "::error::Found $CRITICAL critical vulnerabilities"
            exit 1
          fi
          echo "::endgroup::"

      - name: Build Application
        run: |
          echo "::group::Building application"
          npm run build
          echo "::endgroup::"

      - name: Deploy Database
        run: |
          echo "::group::Deploying database schema"
          npm run deploy
          echo "::endgroup::"

  # ===================================================================
  # TESTING & COVERAGE
  # ===================================================================
  test:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests with Coverage
        id: test
        continue-on-error: true
        run: |
          echo "::group::Running unit tests"
          npm test -- --coverage --ci --maxWorkers=2 || true
          echo "::endgroup::"

      - name: Check Coverage Thresholds
        continue-on-error: true
        run: |
          echo "::group::Coverage validation"

          # Mock coverage check (in production, parse actual coverage report)
          COVERAGE=45
          THRESHOLD=70

          if [ "$COVERAGE" -lt "$THRESHOLD" ]; then
            echo "::warning::Code coverage ($COVERAGE%) below threshold ($THRESHOLD%)"
            echo "::notice::Add tests for srv/product-service.js and srv/analytics-service.js"
          else
            echo "::notice::Coverage ($COVERAGE%) meets threshold ($THRESHOLD%)"
          fi
          echo "::endgroup::"

  # ===================================================================
  # SECURITY ANALYSIS
  # ===================================================================
  security-scan:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: SAST Security Scan
        id: sast
        continue-on-error: true
        run: |
          echo "::group::Static Application Security Testing"

          # Mock security findings - display as warnings for demo
          echo "::warning file=srv/product-service.js,line=280,title=SQL Injection::CRITICAL - advancedSearch uses string concatenation. Use parameterized queries."
          echo "::warning file=srv/product-service.js,line=95,title=XSS Vulnerability::HIGH - Unescaped user input in description field. Add input sanitization."
          echo "::warning file=srv/product-service.js,line=145,title=Insecure Randomness::MEDIUM - Math.random() used for security. Use crypto.randomBytes() instead."

          echo "::notice::Security scan found 3 issues (2 critical, 1 medium) - See security report for details"
          echo "::endgroup::"

      - name: Post Security Report
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const body = `## 🔒 Security Analysis Report

            ### 📊 Summary
            - **Total Issues**: 3
            - **Critical**: 2 🔴
            - **High**: 0 🟠
            - **Medium**: 1 🟡

            ---

            ### 🚨 Critical Issues

            #### 1. SQL Injection Vulnerability (CWE-89)
            - **Location**: \`srv/product-service.js:280\`
            - **Severity**: CRITICAL (CVSS 9.8)

            **Issue**: The \`advancedSearch\` function uses string concatenation to build queries.

            **Recommendation**:
            \`\`\`javascript
            // Use parameterized queries with CAP CQL
            const products = await SELECT.from(Products)
              .where({ name: { like: \`%\${searchTerm}%\` } });
            \`\`\`

            ---

            #### 2. Cross-Site Scripting (XSS) (CWE-79)
            - **Location**: \`srv/product-service.js:95\`
            - **Severity**: HIGH (CVSS 8.2)

            **Issue**: User input in description field is not sanitized.

            **Recommendation**:
            \`\`\`javascript
            // Add input sanitization
            const sanitize = (str) => String(str || '').replace(/[<>"'&]/g, '').trim();
            product.description = sanitize(req.data.description);
            \`\`\`

            ---

            ### ⚠️ Medium Issues

            #### 3. Insecure Randomness (CWE-330)
            - **Location**: \`srv/product-service.js:145\`
            - **Severity**: MEDIUM (CVSS 6.5)

            **Recommendation**:
            \`\`\`javascript
            const crypto = require('crypto');
            const sessionId = crypto.randomBytes(16).toString('hex');
            \`\`\`

            ---

            ### 💡 How to Fix

            **Option 1: Manual Fixes** (Recommended - You control what gets committed)
            1. Review each issue above
            2. Apply the fixes you want
            3. Test locally: \`npm test\`
            4. Commit and push your changes

            **Option 2: Request Automated Assistance**
            Comment on this PR with what you'd like fixed, and maintainers can help.

            ---

            ### 📚 References
            - [OWASP Top 10](https://owasp.org/www-project-top-ten/)
            - [CAP Security Guide](https://cap.cloud.sap/docs/guides/security/)
            - [CWE-89: SQL Injection](https://cwe.mitre.org/data/definitions/89.html)
            - [CWE-79: XSS](https://cwe.mitre.org/data/definitions/79.html)
            `;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

  # ===================================================================
  # CODE QUALITY
  # ===================================================================
  code-quality:
    name: ESLint & Code Quality
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run ESLint
        continue-on-error: true
        run: |
          echo "::group::ESLint analysis"
          npm run lint
          echo "::endgroup::"

  # ===================================================================
  # SUGGESTIONS (NON-BLOCKING)
  # ===================================================================
  post-suggestions:
    name: Post Improvement Suggestions
    runs-on: ubuntu-latest
    needs: [security-scan, test, code-quality]
    if: always() && github.event_name == 'pull_request'
    steps:
      - name: Post Suggestions
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const body = `## 💡 Suggested Improvements

            Based on the analysis, here are some improvements you might consider:

            ### 📈 Test Coverage
            Current coverage is below the 70% threshold. Consider adding tests for:
            - \`srv/analytics-service.js\` - Currently has 0% coverage
            - \`srv/product-service.js\` - Edge cases for validation logic
            - New features like \`bulkPriceUpdate\` and \`advancedSearch\`

            ### 🔒 Security Enhancements
            See the Security Analysis Report above for specific vulnerabilities and fixes.

            ### 🎨 Code Quality
            Run \`npm run lint:fix\` to automatically fix style issues.

            ### 📦 Dependencies
            Run \`npm audit fix\` to update vulnerable dependencies.

            ---

            ### ✅ Next Steps (Your Choice)
            1. Review the issues flagged above
            2. Decide which ones to fix now
            3. Make your changes locally
            4. Test: \`npm test\`
            5. Commit and push

            **No automated commits** - you're in control! 🎯
            `;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

  # ===================================================================
  # SUMMARY CHECK
  # ===================================================================
  pipeline-summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [build, test, security-scan, code-quality]
    if: always()
    steps:
      - name: Create Summary
        run: |
          echo "## 📊 Pipeline Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security | ${{ needs.security-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Code Quality | ${{ needs.code-quality.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Only fail if build stage fails
          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "### ❌ Build Failed" >> $GITHUB_STEP_SUMMARY
            echo "Critical build errors detected. Fix build issues before merging." >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "### ✅ Build Passed" >> $GITHUB_STEP_SUMMARY
            if [ "${{ needs.security-scan.result }}" != "success" ] || [ "${{ needs.test.result }}" != "success" ]; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "⚠️ **Advisory**: Security issues or test coverage noted." >> $GITHUB_STEP_SUMMARY
              echo "Review suggestions in PR comments. Fixes are optional - you decide!" >> $GITHUB_STEP_SUMMARY
            fi
          fi
